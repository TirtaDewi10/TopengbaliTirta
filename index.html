  {
    "id": "TP160",
    "nama": "Kumbakarna,Younger Brother of Rawana",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Despite his ferocity and many evil deeds, the gargantuan raksasa demon Kumbakarna, in contrast to his brother Rawana, was a great warrior of good character. At the outbreak of the war, he is absent because of a trick that was played upon him by the gods to prevent him from obtaining a powerful magically weapon. They cursed him to sleep for six months at a time, and to always wake up in a bad mood with an insatiable appetite. As the war begins to go south, Rawana orders Kumbakarna to be awoken from his slumber before his time. Angry and sullen, when he hears the story of events, Kumbakarna berates his brother for deviously kidnapping Sita rather than honorably defeating Rama in battle. After knocking Sugriwa unconscious in battle, Kumbakarna is finally killed in an epic battle with Rama. With a round face, short forehead, curly eyebrows, prominent third eye and small chin, Kumbakarna appears to be laughing with malicious glee, exposing his teeth and fangs. Nicknamed Joe, Akira Miura was a Japanese businessman with a bicycle repair shop in Denpasar. During the Japanese Occupation he was enlisted as a translator and later served a number of administrative posts including a short appointment as director of the\u00a0Bali\u00a0Museum.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP160.jpg"
  },
  {
    "id": "TP161",
    "nama": "Laksmana, Brother of Rama",
    "tahun": "1930",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Prince Laksmana is the younger brother of Rama, the prince of the Kingdom of Ayodia. As a result of an oath their father swore to his younger wife, Kekayi (Kaikeyi), to place his son by her on the throne, he is forced to banish Rama, Laksmana and Sita from the kingdom for twelve years. Masks of the two brothers are, not surprisingly, very similar, however, Rama's jewelry is usually more sumptuous. In addition his moustache shows more flair expressed in jaunty curves. Laksmana is the archetype of the capable and loyal brother in arms always willing to sacrifice himself to protect and serve. While he plays a secondary to Rama, several such as his spurning of he Rawana's sister. Surpanaka, are key to the story.",
    "lat": -8.657398,

    "image": "TP161.jpg"

  {
    "id": "TP162",
    "nama": "Leyak, Unidentified Witch",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Having lost its original polychrome and vanous attachments, this early example of a leyak witch from North Bali allows a careful study of the interplay of forms and symbols on such masks. The top of the face is dominated by large round eyes with two\n\nupper lines and arching, wavy eyebrows like fans. The radiating shapes, arching tops, deep grooves and connector between the eyebrows are all specific to the style of Rangda masks made in the Singaraja region. Two leaves are tucked into the ears. A large nose with flared nostrils stands above a thick upper lip and a row of square teeth with gaps. The mouth is wide open, with a thin lower lip and chin. The curved tusks usually seen on leyak masks\u00a0are\u00a0missing.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP162.jpg"
  },
  {
    "id": "TP163",
    "nama": "Leyak Peceng, One-eyed Witch",
    "tahun": "20th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "This fearsome asymmetrical mask depicts a deformed acolyte of a wrathful form of Dewi Durga, the goddess charged with overseeing the rites of death (upacara yadnya) and sorcery. It is a reminder that in the Balinese tradition and imagination, there are scores, if not hundreds, of distinct but related incarnations of dark magic practitioners. There are numerous esoteric palm-leaf manuscripts (lontar) that list the names and characteristics of these personages, some of which are even illustrated. The Dutch scholar Christiaan Hooykaas (1902-1979) documented many of these in his book, Toverij op Bali, Magische Tekeningen (Sorcery on Bali, Magical Drawings,\u00a01980).",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP163.jpg"
  },
  {
    "id": "TP164",
    "nama": "Leyak Peceng, One-eyed Witch",
    "tahun": "18th century",
    "lokasi": "National Museum of Indonesia, Jakarta",
    "deskripsi": "Pockmarked, missing an eye and with a crooked mouth, this menacing woman with white dots outlining her eyes and forehead has royal origins, seen in her large golden earplugs and the row of golden blossoms across her crown. She has been identified as a follower of Ki Balian Batur, a fear-some early 18th-century sorcerer who lived in Desa Teledu Nginyah, Kin-tamani, the village on the slopes of the Mount Batur volcano overlooking Lake Batur. Ki Balian Batur, also known as the Raja of the Leyak Witches, was believed to be responsible for a series of deadly pandemics (grubug) that raged in East Bali during this period.",

    "lng": 106.821815,

  {
    "id": "TP165",
    "nama": "Leyak, Witch",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Leyak is a generic term used for all females in service to Durga, the goddess who presides of cemetaries and rituals concerning death. Although well-worn, the liberal use of cinnabar and gold leaf is still visible, especially on the flaming eyebrows and earplugs. With a penetrating gaze, the curvilinear lines of her mouth and sneering upper lip are also noteworthy. In many ways she resembles more of an animal, indicating she is a shapeshiftenr. It does not appear that she ever had a tongue probably indicating that she was a lesser figure among the many servants\u00a0of\u00a0the\u00a0goddess.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP165.jpg"
  },
  {
    "id": "TP166",
    "nama": "Lembu Sore, Mpu Sore",
    "tahun": "1920",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Lembu Sore was the uncle of Ranggalawe and one of the knights who remained loyal to Raden Wijaya in his darkest hours. After the founding of the Majapahit Kingdom in 1293. he became the victim of court intrigue and was sent to a minor post on the island of Madura. This so affronted Ranggalawe that he marched to the capital to confront the king, giving his his enemies the opportunity to brand him in absence as a traitor. His death sentence was carried out by Kebo Anabrang, who not only did the deed but also tortured and mutilated him. This so enraged Lembu Sore that he attacked Anabrang from behind and stabbed him to death. Declared a criminal, Sora was subsequently banished from the kingdom. Whereas most depictions of old men have white complexions and a more contemplative demeanor, this example-with large, piercing round eyes and a dark complexion that stands out in contrast to the long white mustache and bushy eyebrows-retains much of the vitality of youth.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP166.jpg"
  },
  {
    "id": "TP167",
    "nama": "Mantri",
    "tahun": "1938",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "While the Barong Landung is best known for its two main figures-the black-faced Jero Gede and his white-faced wife, Jero Luh-in certain areas in the region of Denpasar, these giant puppets are joined by their children and other personages. The group wan-ders through village streets at the end of the Galungan-Kuningan festivities, spreading mirth with their quirky movements and bawdy call-and-response couplets.\n\nThese two resplendent masks show Mantri, the son who's name implies that he is well-educated, and Galuh, or princess. In contrast to their odd-looking parents, they appear to be handsome aristocrats. Their status is emphasized by the light color of their skin (flesh-tone and cream), and large golden ear ornaments: Mantri's are pais-ley-shaped while Galuh wears round earplugs (subeng). In addition, Galuh wears a beautiful crown encrusted with jewels that rises above her hairline. What they do share with Jero Gede and Luh are a pair of extremely large ears that point out to the side. This may have to do with a prevailing belief in Eastern countries that large ears are a sign of intelligence and good character.",
    "lat": 52.164104,
    "lng": 4.483984,
    "image": "TP167.jpg"
  },
  {
    "id": "TP168",
    "nama": "Mayadenawa, Abiseka",
    "tahun": "1934",
    "lokasi": "Museum of Puro Mangkunegaran, Solo",
    "deskripsi": "Son of the raksasa demon, Sri Jaya Pangus, and Dewi Danu, the goddess of Lake Batur, Sri Mayadenawa was a mighty practitioner of the dark arts which he used to establish hegemony over Bali and the neighboring islands in the 11th century. As his power grew so did his arrogance. Believing himself invincible, he ordered the populace to make offerings and prayers to him rather than the gods and ancestors. This so enraged the priest, Mpu Sangkul Putih that he mounted Gunung Agung and asked them to intervene. Confronted with the army of Indra, the king of the gods, Mayadenawa fled to Tampaksiring and resorted to magic to throw his pursuers off his path. In the end, he would take on the form of jungle fowl (manuk), but was finally trapped and killed. Villainized as the epitome of evil (adharma), his defeat is celebrated every 210 days during the Galungan-Kuningan Festival. In an alternative reading, it has been speculated that Mayadenawa was a Buddhist who sought to break the monopoly of the Shaivite\u00a0priests.",
    "lat": -7.566756,
    "lng": 110.823071,
    "image": "TP168.jpg"
  },
  {
    "id": "TP169",
    "nama": "Wredah",
    "tahun": "1937",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Whereas on Java Merdah is Twalen's younger brother, on Bali he is also known as his son. Like his father, Merdah is short, dark-skinned and ugly. Whereas Twalen has a short nose, Merdah's is huge. Considered wise and trustworthy, he is a valuable aid and constant companion to his father. The leather crown of the mask is decorated with motifs using yellow pigment, which was frequently employed by troupes who could not afford the luxury of pure gold leaf (perada).",

    "tahun": "1940",
    "lokasi": "Private Collection, Bali",
    "deskripsi": "Done in the realistic style of Singapadu, Merdah with a light brown face and yellow lips still wears his original crown which is delicately perforated buffalo leather which has been gilded and inlaid with mirrors. His elongated earlobes have been stretched by heavy missing earplugs. While Wayang Wong performances became increasingly are in the 20th century masks centers continued to produce them to sell to foreigners.",

    "nama": "Wredah",
    "tahun": "1920",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "With a gray complexion, deep wrinkles drawn in white, almond-shaped eyes, flapping ears that stick out to the side, a prominent nose, large chin and a thick-lipped open mouth exposing two teeth, this depiction of Wredah shows similarities to Jero Gede, the male figure in the Barong Landung dance. The mask was made by another famed mask maker, Ida Bagus Oka Kerebuak, from Griya Pidada Klungkung, East Bali.",

    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Kedingkling, also known as Blas-Blasan, is a rare sacred dance only performed in a handful of villages. Because the dancers wear masks identical to those of the Wayang Wong, it is difficult to distinguish between the two forms, and Kedingkling could arguably be seen as a local form that originated from Wayang Wong. Wredah, like his father, is a wise advisor to Prince Rama, a role that is clearly mirrored in the profound expression of this remarkable mask. It was created in the 19th century by I Made Lontar, who trained under the master mask-maker Tjokorda Api of Singapadu. Other masks made by these two master artists are still used in Singapadu for ritual performances.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP172.jpg"

  {
    "id": "TP173",
    "nama": "Gareng, Son of Twalen",
    "tahun": "1930",
    "lokasi": "Museum Sonobudoyo, Yogyakarta",
    "deskripsi": "These two masks, together with those on the previous page, belong to the same set originally collected by the Java Instituut, which worked actively in Bali and Lombok, as well as Java.\n\nThey are now in the collection of the Sonobudoyo Museum in Yogyakarta. Consisting of two advisors to the hero Rama, Twalen and Wredah, and two to his adversary, Rawana, Delem and Sangut. Together the four are known as punakawan from the root words panah (to understand) and kawan (friend), thus those who understand their friends. On Bali they are often referred to as penasar from the root word dasar or foundation.\n\nDespite their odd exteriors and comic antics, they are in essence spiritual advisors to kings and princes.",

    "lng": 110.359438,
    "image": "TP173.jpg"
  },
  {
    "id": "TP174",
    "nama": "Wredah Son of Twalen",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "This image of Merdah, the intelligent and resourceful son of Twalen who aids his father in advising the wise king, displays a thought-provoking pathos that is unusual for this character. Usually shown with a somewhat animal-like nose and lower face, here Merdah's elongated face, olive complexion, downcast eyes and open red lips seem both human and contemplative. Although there is no direct connection, the mask is also reminiscent of the Western archetype of the sad-eyed clown. The discovery of such distinct and powerful masks raises that fall out of the classic canon be the question of whether they are one-offs or survivors of larger sets.",

  {

    "tahun": "1938",
    "lokasi": "Private Collection, Bali",
    "deskripsi": "At the time that Arjuna was performing spiritual penance on the slopes of Indrakila Mountain, the raksasa, Niwatakawaca, ordered his prime minister Patih Momo Simuka, to kill the young Pandawa on his behalf. To do so he assumed the shape of a wild boar. Charging him with his fierce tusks, Arjuna, who was in deep meditation, shot him with an arrow without breaking his concentration. Suddenly a disgruntled hunter showed up claiming the carcass has his own. A battle ensued but before anyone was hurt Arjuna realized his foe was an incarnation of Siwa, who granted him a boon.",

  {
    "id": "TP177",
    "nama": "I Gusti Ngurah Kanca",
    "tahun": "1937",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "This mask depicts | Gusti Ngurah Kanca, a minister in the court of Dewa Agung, the first raja of Klungkung. Dynasty which was established after the fall of the Gelgel. Together with I Gusti Ngurah Jelantik and I Gusti Ngurah Pacung (Arya Sentong), Kanca conquered both the Sasak kingdoms of Lombok and Nusa Penida, the island just south of Klungkung. They were rewarded by the raja for their victories with a magical spear named Baru Jaruju. The relationship between the three comrades soured after Gusti Jelantik refused Kanca's request to marry his daughter on the grounds she had already been promised to Arya Sentong. Consumed with anger, Kanca slandered his old friends. After Gusti Jelantik told the raja that Kanca was planning a rebellion, the king issued a death sentence. Luckily, it was rescinded at the last moment after it came to light that this was not true.",

  {
    "id": "TP178",
    "nama": "The Witch",
    "tahun": "1920",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "With a dark complexion, piercing eyes, big nostrils and a gaping mouth with large lips, Ni Garu grins with evil glee. She plays a key role in the story of I Gede Basur-by day a respectable minister of the Udayana Dynasty ruling Bali, yet by night a fearsome practitioner in the dark arts. While young and innocent she falls in love with Basur's worthless son, I Tigaron, who despite his own ugly exterior, insults and humilates her in public. Inconsolable, she flees to the cemetery where she meets Bhatari Durga, the goddess of the underworld, who initiates her into the dark arts. After becoming an adept she returns and defeats and exposes the evil Basur in a magical battle of epic proportions.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP178.jpg"
  },

    "deskripsi": "Ni Garu is a female practitioner of black magic who uses her occult power derived from Bhatari Durga (Goddess of Mrajapati) to kill her male nemesis, the sorcerer I Gede Basur, who appears in some versions of the Calonarang Dance (Panyalonarangan). With a red complexion, round face, slit eyes, arched eyebrows, a small nose, wild hair and a large mouth exposing her the evil grin of her upper and lower teeth, Ni Garu presents a formidable and\u00a0dangerous\u00a0foe.",

  {
    "id": "TP181",
    "nama": "Ni Garu",
    "tahun": "1936",
    "lokasi": "Private Collection, United States",
    "deskripsi": "A refined minister in the 11th Udayana court by day, I Gede Basur, was a secret practitioner of magic, which he surreptiously used to advance and enrich himself unbeknowst to his peers. One time after a pretty village girl and her father refused to marry his ugly son because she was bethrothed to another, he cast a spell of pestilence on her entire village that caused them all to die. Basur would meet his match in the form of Ni Garu, a plain looking silly girl who fell hopelessly in love with his son, I Tigaron, who cruelly humiliated her for daring to think she was his equal. Overcome with shame the girl flees to the cemetery to kill herself where she encounters Bhatari Durga, the goddess of the underworld, who invites her to become a member of her witches; coven. Developing amazing powers, she would challenge and defeat Basur and expose him as a sorceror. Here Basur is shown in a demonic form with a greenish pallor, broad nostrils, wild hair and enomrous red lips with black and white teeth. Ironically he closely resembles the yellow faced Garu who shares the same intense expression and enormous lips. Both masks are from the same maker.",
    "lat": 40.7128,
    "lng": -74.006,
    "image": "TP181.jpg"

  {
    "id": "TP182",
    "nama": "Jaran Guyang, Nyi Goyeng",
    "tahun": "18th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Wide-eyed and staring directly forward with her mouth agape, this ominous mask shows the shape-shifting witch (leyak) Nyi Guyang in her human form.\n\nHer unruly hairdo and prominent ears with large red earplugs add to the impression of wild power. Guyang is an apprentice of the sorceress Rangda (also known as Ratu Gede Mecaling), and an inner member of her witches' coven. Her mastery includes the making of love potions (ilmu pelet) and shape-shifting, and she is often depicted in her favorite alternative form as a tiger. In some performances she also becomes a yellow horse, for which she is known as Nyi Jaran Guyang.",

    "lng": 115.218579,
    "image": "TP182.jpg"

  {
    "id": "TP183",
    "nama": "Disciple of Calonarang",
    "tahun": "18th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "With a round white face, large earplugs, evil-looking slanted eyes, wide nostrils and a gaping grin exposing her teeth, this mask depicts Nyi Lendi, the younger sister of Nyi Lenda, in her human form. Lendi and Lenda are both members of inner circle of the witches' (leyak) coven presided over by Calonarang, the servant of Dewi Durga, a wrathful form of the goddess who oversees all rituals pertaining to death and the afterlife. Nyi Lendi is a master shape-shifter who specializes in assuming the form of a checkered tiger (macan poleng). Usually shown in her witch form, the mask-maker here plays the thin line between the style of the mean-spirited female maidservant (bondres) and early forms of the dark magic practitioners who live hidden among the populace.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP183.jpg"
  },
  {
    "id": "TP184",
    "nama": "Nyi Lendi, The Tiger Witch",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Nyi Lendi, the younger sister of Nyi Lenda, is also a member of Rarung's inner circle. Among her many powers is the ability to suddenly burst into an incandescent flame and incinerate her enemies. Her most potent destructive form, for which she is most infamous, is that of an all-powerful tiger demon. The surface of this red mask is covered with dots, markings known as checkered tiger (macan poleng). Notably these splotches with their black outlines more resemble the spots of a leopard (macan tutul), which like the tiger is native to Bali. It is possible that the artist wished to visualize her ability burst into flame.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP184.jpg"
  },
  {
    "id": "TP185",
    "nama": "The Witch Lenda",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "The sorceress Calonarang is a wrathful incarnation of the goddess Durga, who rules over the Underworld Her female disciples are usually depicted with all of their goddess' fearsome attributes, including fangs, tusks and a long flaming tongue. However, as seen in this mask, this is not always the case. Lenda is the most intelligent of Calonarang's acolytes. An expert in black magic, she is the author of several palm-leaf manuscripts on the dark arts, including Cambra Barag. She is also a shape-shifter who can take the form of a dog-demon. Here she is depicted with a white complexion, large round eyes, a short nose, prominent nostrils and a roundish mouth with four jutting teeth. Her matted hair is thick and she wears egg plant shaped earrings. While no great beauty, Lenda's demonic origins are not immediately apparent.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP185.jpg"
  },
  {
    "id": "TP186",
    "nama": "Nyi Lenda",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Nyi Lenda is one of the senior acolytes of Rarung's coven of witches, who serve the wrathful form of Dewi Durga, the goddess of death and disease. Lenda is considered the most intelligent of the group and a scholar who authored numerous palm-leaf manuscripts on the subject of black magic. Like her sister Lendi is a shapeshifter, who prefers the form of a demon dog. With long, curved lower tusks extending far out to the sides and an extended row of upper incisors, she is often mistaken as Rangda. Gilded flames, symbolic of her magic powers, rise up from her forehead, while spiral flames made of perforated water buffalo hide spring out of the sides of her mouth. A long tongue swirling with power hangs from\u00a0her\u00a0open\u00a0mouth.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP186.jpg"
  },
  {

    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Known as the right hand of Rarung, Nyi Waksirsa seen here with long curved tusks and razor-sharp bristles, specializes in taking on the form of a vicious demon boar. Her ferocity is expressed in bulging round eyes and a large mouth with a border of dark hair. She wears two round engraved discs as earplugs in her ears, which stand out sideways from her head. Two large horn-like triangles are seen on either side of her crown. The art of shapeshifting can be traced back to seeking the aid of animal spirits through supernatural\u00a0spells.",

  {
    "id": "TP188",
    "nama": "Raja Tua, The Old King",
    "tahun": "1970",
    "lokasi": "Griya Danginan, Mas",
    "deskripsi": "While firmly based on the mask of the old raja who relives his past glories in Pajegan and Panca performances, after working together with Japanese dancers began imbuing many of his new masks with Japanese aesthetics in this case a character from the Noh tradition, known as Kojo or the old man. Representing dignity and divinity, Kojo is a sacred figure of veneration. In other cases Anom, soon followed by other mask makers also began make reproductions of Japanese masks. Most were destined for export with little influence on traditional Balinese dance. This mask was used in Balinese per-formances and is now in the private collection of Anom's family com-pound.",
    "lat": -8.54362,
    "lng": 115.26985,
    "image": "TP188.jpg"
  },
  {
    "id": "TP189",
    "nama": "Raja Tua, The Old King",
    "tahun": "1930",
    "lokasi": "Collection Sanggar Seni Kakul, Batuan",
    "deskripsi": "These two depictions of the Old Raja, one from before the war, the second the 1970s, represent the opposite ends of a creative spectrum that endured for some seven decades. It is interesting to note that this particular character is virtually unknown before the rise of Topeng Panca in the 1920s. Free of many of the religious and ceremonial restrictions of Pajegan, because Panca groups consisted between four and nine dancers, it was possible to increase the tempo of performances and allow individual dancers to develop and specialize in roles. Well-received by audiences, they also brought fame to the best dancers. In both depictions, the Old Raja cuts and elegant figure, despite the ravages of age seen in long white disorderly facial hair and deeply grooved age-lines amplified by wide-eyed worried expressions. Born in the 19th century, Kebes would play a leading role in the development of new characters or ways of depicting them before his death in 1962. The far younger Tangguh would achieve his fame in the 1970s during the postwar era.",
    "lat": -8.584877,
    "lng": 115.277934,
    "image": "TP189.jpg"
  },

  {
    "id": "TP191",
    "nama": "Raja Tua, The Old King",
    "tahun": "1940",
    "lokasi": "I Made Nyarikan Sriada Family Temple, Denpasar",
    "deskripsi": "Although Raja Tua almost always appears in Topeng Panca performances, its absence in older collections might indicate that it may be a creation of one or more anonymous Panca mask dancers that subsequently soared in popularity at a later date that is now an icon. There are several notable cases of this happening. One of the masters of this was I Dewa Putu Kebes of Batuan, who is credited for having invented several new characters. Inevitably it requires the combination not only of a great mask maker but also a charismatic dancer who brings it to life. In some cases, the makers and dancers are one in the same.",

  {
    "id": "TP192",
    "nama": "Panji Angragani",
    "tahun": "1930",
    "lokasi": "Museum of Puro Mangkunegaran, Solo",
    "deskripsi": "Originally identified as Rama by our experts, an inscription on the back of the mask has revealed that this self-assured princely figure with golden flowers, a bump between his eyes indicating wisdom, a vigorous moustache and mischievous grin is Panji, the hero of the Malat Cycle. This is an astonishing and important discovery because it has been long assumed that the tales of this perfect prince were only performed in archaic Gambuh plays and Wayang Kulit and had never part of Bali's mask repertoire. As Panji stories, are the subject of mask dances still performed in Cirebon, Solo and Yogyakarta, there can be no doubt that they all, like Gambuh, originated in the Majapahit court thus the likelihood of it existing on Bali, as well, is not illogical. This is further supported by the presence of Panji masks in the Bali Museum and the National Museum in Jakarta.",

    "tahun": "1930",

    "deskripsi": "With a rich terracotta hue face and well drawn features, I Gusti Patandakan, is done in a realistic style typical of the work of Kerebuak. The grandson of Sri Kresna Kepakisan, the Majapahit appointed ruler of Bali, he joined his grandfather during his tenure on Bali. After the disentigration of the Majapahit Empire, its legacy would pass on to Gelgel with its capital in East Bali. Wise and calm of character, Patandakan was appointed prime minister and served faithfully for many years.",

  {
    "id": "TP196",
    "nama": "Patih Deling Keras, Strong Prime Minister",
    "tahun": "19th century",
    "lokasi": "I Made Nyarikan Sriada Family Temple, Denpasar",
    "deskripsi": "Whereas all masks depicting strong prime ministers are forceful, this example with a distinct frown, reddish-brown face, popping eyes and long vertical lines that appear to be blood vessels appears to be on the brink of explosive anger. This mask may depict Patih Nambi, an important historical figure who was among the comrades supporting Raden Wijaya who would go on to found the Majapahit Empire in 1293. As a reward, Nambi, a clever diplomat and administrator was named the first prime minister. He would also play a role in the tragic tale of Ranggalawe and would finally meet his death at the hands of Jayanegara, the second Majapahit king, after being falsely accused plotting to assassinate him.",

  {
    "id": "TP197",
    "nama": "Patih Deling Manis, Refined Prime Minister",
    "tahun": "1935",
    "lokasi": "Asian Art Museum, San Francisco",
    "deskripsi": "I Ketut Patere, a member of the legendary Pita Maha Balinese Artists' Union, achieved recognition as both a talented sculptor and painter in the Batuan style. The face here is an elongated oval and exudes calmness and peace. Patere's sculpture, too, was often thin and long. The mask is a reminder that majority of the Pita Maha artists, often labeled as modernists, were originally trained in the traditional arts. This was especially true in Batuan, which along with nearby Sukawati and Singapadu, was a famous center of mask making and dancing since the 17th century. The mask of a refined prime minister was bought by the Austrian author, Vicki Baum, in 1935 certainly with the aid of Walter Spies who was her guide on the island while she was doing research for Love and Death in Bali, a novel she published in 1937. Sadly Patere had passed away the year before.",
    "lat": 37.780277,
    "lng": -122.41616,
    "image": "TP197.jpg"
  },
  {
    "id": "TP198",
    "nama": "Patih Deling Manis, Refined Prime Minister",
    "tahun": "1972",
    "lokasi": "Griya Danginan, Mas",
    "deskripsi": "Nicknamed, the Purple Prime Minister, because of the hue of his skin, this lively mask, created by Ida Bagus Anom, the youngest son of Gelodog, is a fine example an accelerating tendency to experiment with new colors and features that began in the 1970s. Anom was a leader in this trend. Walking in the footsteps of his illustrious father he was one of the main reasons Mas gained the sobriquet of the 'Village of Masks'. He would later experiment fusing features of Noh and Balinese masks into one oftentimes for modern cross-cultural performances. Where he led, many others followed and it did not take long for many other mask making ateliers to spring up along the back alleys of Mas.",
    "lat": -8.54362,
    "lng": 115.26985,

  {

    "tahun": "1935",
    "lokasi": "Asian Art Museum, San Francisco",
    "deskripsi": "With the kind smile and gentle features of a Patih Deling Manis, good prime minister, this mask is unpainted except for the staining of the hair and some facial features.",

    "image": "TP199.jpg"

  {
    "id": "TP200",
    "nama": "Patih Deling Manis",
    "tahun": "1930",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "The archetype of the intelligent prime minister (patih deling manis) is not based on a single historical figure but rather an idealized merger of many men such as the 11th century minister of Daha, Mpu Sedah, who was also a famed poet. His greatest work was the Bharatayuddha, the Javanese version of the Mahabharata Epic. With a yellowish patina, the minister stares forward, like a man who knows what he wants. With fine. well formed features and a large golden urna ornament on his forehead, his hairline is decorated with a row of gold disks. While this mask may have been used to represent a specific, now forgotten historical character, it is just as likely that it was used in both Topeng Pajegan and Panca to represent any number of prime ministers with forceful vision and action yet with distinguished characters and\u00a0good\u00a0etiquette",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP200.jpg"
  },
  {
    "id": "TP201",
    "nama": "Patih Deling Manis,Refined Prime Minister",
    "tahun": "1940",
    "lokasi": "I Made Nyarikan Sriada Family Temple, Denpasar",
    "deskripsi": "Despite sharing the same reddish complexion as the forceful prime minister in the Sriada collection, here there is no sense of aggression, anger or worry. With closed lips, it gives rather the impression of a calm character. The gilded silver ornament between his eyes indicates wisdom and aristocratic origins.",
    "lat": -8.65528,
    "lng": 115.21734,
    "image": "TP201.jpg"

  {

    "tahun": "1930",
    "lokasi": "Collection of the Griya Pidada Family Temple, Klungkung",
    "deskripsi": "With bushy hair and long sideburns connected to his mustache, Patih I Gusti Ngurah Jelantik IV, also known as Bogol, was part of a line of nobles from Blahbatuh who served the Majapahit Empire, its successor Gelgel. It was his father, Jelantik III, who put down an uprising in Blambangan, East Java on behalf of Waturenggong, in the mid-16th century. Upon his return he would present his lord with war booty that included the Gadjah Mada masks now in Blahbatuh. Bogol, too, would achieve military glory in his own right in 1621 after he defeated the rebellious Ki Dalem Bungkut and seized the island of Nusa Penida for his king Dalem di Made. While I Gusti Panji Sakti, the founder of Buleleng claimed to be the legitimate son of Dalem di Made. While he may have been the illegitmate son of Dalem di Made, there is also a rumor that he was the son of Bogol.",

  {
    "id": "TP203",
    "nama": "Patih Kebo Angun-angun",
    "tahun": "19th century",
    "lokasi": "National Museum of Indonesia, Jakarta",
    "deskripsi": "The Malat Cycle, a 12th century medieval poem, consists of several stories about Panji Amalat Rasmi, the king of Jenggala, and his wife, Princess Dyah Ratna Merta, queen of Kediri. In one, the crown prince Panji denounces his titles and leaves the kingdom after his father refuses to allow him to marry the girl he loves. Worried by his absence, the king sends Kebo Angun-Angun to find his son. His search is fruitless but as he returns he encounters a man, Carang Naga Puspa, who provokes an argument that nearly erupts into a fight before Angun-Angun realizes that he is Panji in disguise. After the king relented and allowed him to marry Dyah, Panji would finally return to Janggala and later ascend the throne, appointing Angun-Angun, shown here as a mature, but somewhat tired aristocrat of high standing, as his prime minister.\n\nAccessioned to today's National Museum at an early date, an inscription on the back of the mask to the left reads, &quot;made by Ida Bagus Putu Rai of Tabanan&quot; followed by a mantra, &quot;May the spirit of Siwa and Pasupati invest this mask with magical power (taksu).&quot; In addition it identifies this exquisite depiction of a vigorous and handsome young aristocrat as Dalem Panji or King Panji. With intense but compassionate eyes, well-formed features, a dashing moustache. open smiling mouth, red lips and pearly teeth, the portrait is a masterpiece. It is an all the more remarkable find because it is the creation of a previously unknown master from Tabanan, a regency not well known for mask making, sobering proof how much more there is to learn about this ancient art. While now largely sidelined, it should be remembered that the Malat Cycle so resonated with the people of Southeast Asia that it influenced performance arts not only on Java and Bali but also Sumatra, Sulawesi, the Malay Peninsula, Thailand and Burma.",

    "tahun": "1930",
    "lokasi": "Museum of Puro Mangkunegaran, Solo",
    "deskripsi": "Patih Nambi was one of the knights allied with Raden Wijaya after the collapse of the Singosari Kingdom. Sadly, intrigue in the newly founded Majapahit court would drive them apart. This would begin when Ranggalawe expressed his disappointment when Nambi was named prime minister instead of him. Wishing to rid himself of rivals, Nambi, aided by Mahapati, poisoned the ear of Raden Wijaya leading to the appointment of his uncle to a minor post. Festering with anger, Ranggalawe rose in protest giving his enemies the opportunity to label him a rebel and have him brutally killed. Held in contempt for his role, Nambi, too, would become a victim of intrigue after he suddenly left the capital upon receiving a forged letter that his father was on his death bed allowing Mahapati to convince Jayakarta, the second Majapahit king to execute him in 1316.",

    "deskripsi": "With deep lines under his eyes and his mouth, the specific role of this mask was to appear on stage at the opening of performances together with the king's clownish advisors (punakawan). While the clowns would speak of the glory of their king and engage in gossip, it was penglembar who shed light upon the challenge on hand that would develop into the story told. As behavior was based on clearly delineated character types and plots used in many stories, the information provided might not even mention any particular historical character until far later in the performance.",

    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Patih Pengrupak, along with Tajeg Reneng, was a trusted member of Raden Wijaya's palace guard. Charged by the raja to spy on the movements of Ranggalawe after he left his palace in Tuban, East Java, his life was often at risk. Pengrupak's pale rose skin color is marred by blood coming out of numerous facial wounds, inflicted by his enemies after his espionage activities were uncovered. Clever and quick of foot he was luckily always able to make a getaway but not without getting cut in the process.",

    "tahun": "1937",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Ra Semi was one of the seven council members advising Raden Wijaya after the founding of the Majapahit Empire In 1293. Together with Ra Kuti, Ra Tanca, Ra Wedeng, Ra Yuyu, Ra Banyak and Ra Pangsa these wise men were known as Dharmaputra (Sons of the Righteous Path). After Raden Wijaya died in 1309 and was succeeded by his son, Jayanegara. Ra Semi left the main court in Trowulan and retired to Lasem. As time passed, Jayanegara increasingly proved himself to be an incompetent and evil ruler. This led Ra Semi and the other members of the Dharmaputra Council to rise up against him. All came to an end In 1398, when Jayanegara was assassinated by his physician Tanca, who accused him of seducing his wife. In turn, Tanca was killed by the prime minister Gadjah Mada, who, with the support of other nobles, placed Raden Wijaya's daughter Tribhuwana Wijayatunggadewi, on the throne. Supported by Gadjah Mada, her son Hayam Wuruk went on to become the greatest monarch of the dynasty.",

    "id": "TP213",
    "nama": "Patih Sidakarya",
    "tahun": "1925-1940",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "As masks of other characters or types that fall into sometimes narrow visual parameters, artists have show great versatility in expressing their own vision of the men and women they are portray. Each of these Sidakarya masks shares a pale complexion, narrow curved eyes and big red mouths with oversized forward jutting teeth, yet each of them has its own unique pres-ence. With bushy black eyebrows and a matching unkempt moustache and goatee, the man on the upper left seems younger (Anecdotally the mask was bought for less than a dollar in 1936). In contrast, the white wisp of a beard of his neighbor belongs to an older man, an age more appropriate the original story. On this page, Sidakarya, described as a minister, assumes a more royal stature with golden jewelry, facial lines and better groomed hair. Smiling mischeviously, their intentions are not easy to read. Frits Liefkes, a well respected scholar and curator of antique furniture at the Rijksmuseum, was also a passionate lover of Indonesian art. After his death he would be-queath his considerable collection to the Ethnographic Museum in Leiden",

    "tahun": "18th century",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "With a reddish complexion, prominent facial lines and a large row of incisors, Patih Sore, also known as Lembu Sore, is here seen as a determined man of fierce disposition. The uncle of Ranggalawe, he was also one of the nine original knights who had stayed true to Raden Wijaya. In contrast to his nephew, Lembu Sore did not rise up in anger after being assigned a minor post hardly deserving after all his sacrifices. When he learned how Kebo Anabrang had slain Rang-galawe, Lembu became so enraged that he stabbed him from behind. Branded a murderer, Lembu was banished from the kingdom.",

    "deskripsi": "Pedanda Boda with their red headdresses (ketu), ghanta bellis and vajra, stylized thunderbolts, are a vestige of the esotenc Buddhist Vajrayana faith. Since the 16th century, under the influence of the reformist Javanese high priest Danghyang Nirartha, they have been given special status separate too but nonetheless part of a greater Shaivite orthodoxy. Most notably both types of priests are needed for the completion of the most important religious ceremonies.",

    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Until the 16th century, Balinese religion was divided into a number of sects. While Shaivism, which worshiped Siwa as the supreme god, was the largest and most important, esoteric Buddhism was also prominent and influential. The two streams merged during the Gelgel Dynasty under the auspices of Javanese high priest Danghyang Nirartha. While Buddhist high priests (Pedanda Boda) maintained their own mantra, rituals and paraphernalia, especially the vajra or diamond thunderbolt, they also recognized Buddha as an incarnation of Siwa, giving rise to the term Siwa Boda. Supremely alert and exuding immense power, this archetype of a Siwa Boda Pedanda is a vigorous young man that closely resembles a prince.",

    "deskripsi": "Along with the Mahabharata Epic, the Ramayana, which dates back to the 3rd century BCE, has exercised a profound impact on Indonesian art and culture. Whereas the depiction on Rama on the previous page is highly refined and aristocratic, this red colored example is far more determined. Both share lively eyes, arching eyebrows, distinctive curvy mustaches and an open mouths exposing white teeth of inlaid mother of pearl. Prince Rama was an incarnation of Lord Wisnu sent to earth to defeat the sorcerer-king Rawana, who, because of his severe austerities and meditations, was rewarded by Brahma with invincibility. At the climax of the story, Prince Rama battles his arch-nemesis to rescue his wife Princess Sita, who was abducted and imprisoned by the sorcerer-king. The mask, which is in the style prevalent in Denpasar, is of great age, as seen by its wear.",

    "tahun": "1930",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "While refined princes like Rama and Panji usually have white or light-yellow complexions, this dark brown image of Prince Rama shows that this is not always the case. Sometimes green and blue complexions are also used. What remains constant is the wavy shape of the mustache, vigorous expression and the open mouth exposing the upper row of teeth. Remarkably, other than the color of the skin and the large golden urna ornament on the forehead, this mask, made by I Gusti Putu Kandel of Puri Abasan Palace in Denpasar (Badung), is virtually identical with the depiction of Rama (page 3) by Ida Pedanda Made Sidemen of Sanur, which was made around the same time. Only ten kilometres from the center of Denpasar, Sanur, with its many high priests, was closely linked with the rulers of Badung. Sideman, for example, was a close friend and ally of I Gusti Ngurah Made Agung, the raja of Badung. While certain local and individual styles are distinguishable, for the greater part the arts of Sanur and Denpasar existed in a continuum.",

    "deskripsi": "This mask was created and used by the farmed mask-maker and dancer Cokorda Oka Tublen of Singapadu, the scion of a long line of performers dating back to the 18th century. Tublen was invited to perform with a dance troupe from Peliatan at the Netherlands Indies Pavilion of the 1931 International Colonial Exposition in Paris. This was the mask that he took with him, astounding audiences that included many of Europe's most famous modern artists. Although damaged, the vibrant expression of the mask is still very much\u00a0evident.",

    "tahun": "18th century",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Ranggalawe was the son of famed strategist Arya Wiraraja and one of the nine nobles who remained loyal to Raden Wijaya after his father-in-law Kertanegara, the last king of the Singosari Dynasty, was murdered by Jayakatwang. Together they would defeat both Jayakatwang and the invading Chinese troops of Kublai Khan, the Mongol emperor of China and go on to found the Majapahit Empire with Raden Wijaya as its king. Sadly court intrigue led some of the princes to slander Ranggalawe. As a result Raden Wijaya sent his uncle to a minor post far from the capital. Interpreting this as an insult, the prince rose up in protest. Tragically, he was brutally and unjustly slaughtered. This sad tale, one of the most beloved and influential on Bal\u0131, ends with Raden Wijaya bemoaning the cruel fate of his dear friend and former comrade-in-arms. Here Ranggalawe is depicted as a handsome but robust prince in his prime.",

    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Rarung is an acolyte of a wrathful form of Dewi Durga, who is associated with the rites of death. She is said to be younger than Rangda. Entering a deep meditative state after taking a vow of silence, Rarung is rudely disturbed by the gods Indra and Brahma, who are searching for Durga on behalf of her husband Lord Siwa. When Rarung does not answer them, Indra and Brahma attack and defeat her, and she subsequently reports the incident to Dewi Durga. Indra and Brahma report Durga's location to Siwa, who descends to find her, disguised in the form of Banaspati Raja (Barong). Husband a nd wife battle upon meeting, in this version of the Barong-Rangda dance that is native to Denpasar. With a crown ringed by flames and long outward-curving lower fangs, this is an example",

    "id": "TP241",

    "tahun": "1930",

    "deskripsi": "Oval-faced with a short forehead, chevron shaped eyeballs, high set ears with huge inlaid earrings, the curly beard of Rawana is interwoven with gold. Fearless and invincible, Rawana who was also known as Dasa Muka, he with ten heads, is a classic story of a powerful being felled by his own hubris. The son of a great sage and a raksasa demon, Rawana was a highly respected scholar with a deep knowledge of the scriptures, medicine and science. Meditating for over 10,000 years, he was granted the boon of immortality against all beings except for humans, who he considered weak and insignificant. This led the gods to have Wisnu reincarnate as the glorious Rama who would act as their intrument. After a mighty struggle, Rama slayed Rawana in the final battle and freed his wife Sita.",

    "tahun": "1935",
    "lokasi": "Private Collection, Switzerland",
    "deskripsi": "Rawana, king of Alengka (Sri Lanka), was not only an awesome warrior himself but also the leader and role model of perhaps the most impressive alliance of demons to have ever existed. Among the greatest of them were those who were the offspring of sages and gods who had trysts with female raksasa, most who had mastered the ability of shapeshifting allowing them to take on all manner of beauteous forms. The richness of Rawana's brown complexion is the result of layering beginning with a gesso foundation, a reddish underlayer and chestnut brown outer surface While his eyebrows were once made of fur covered hide, the tight round curals of his moustache, beard and sideburns are carved directly into the wood. In the classical Hindu stories there is often an undercurrent that suggests that Raksasa psychology was often driven by a sense of low self-esteem and anger with the gods who looked down upon them even when the achieved great knowledge and power. This can be seen in one of the early episodes of the Ramayana, when Laksmana not only spurns the love-sick advances of Rawana's sister, Surpanaka, but also cuts off her nose for daring to think he would ever consider becoming her lover. After she reports the affront to Rawana he vows revenge, setting the drums of war into\u00a0motion.",

    "deskripsi": "With a face bristling with fangs and tusks, not only around his mouth but also on his side cheeks and the top of his crown, the sheer force of the expres-sion and features of this red-faced demon warrior epitomizes the Balinese dread of the supernatural inhabitants of the Underworld. Such masks mark the merger of old exorcistic tribal traditions that pre-date Hinduism and Bud-dhism and Tantric rites, which flourished on Sumatra, Java and Bali during the Singosari and Majapahit\u00a0eras.",

    "id": "TP247",
    "nama": "Raksasa Demon",
    "tahun": "1930",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "In the past, the largest Wayang Wong troupes were grand pageants with large casts of as many as one hundred dancers. While the main protagonists are well-known, there were also numerous minor characters (many of whom were considered the equivalent of extras) that are not easy to recognize. Now that the number of troupes and players has declined, taking with them many secrets, it is even more challenging to identify such masks. Nonetheless, a careful observation of the characteristics of this mask-with its reddish complexion, bulging eyes, bristling teeth and curly beard-reveals it to be a raksasa demon of royal descent, and henchman of Rawana, the sorcerer-king\u00a0of\u00a0Alengka.",

  {
    "id": "TP248",
    "nama": "Two Raksasa Demon",
    "tahun": "1980",
    "lokasi": "Private Collection, Mas",
    "deskripsi": "Up until the 1970s the masks made in the village of Mas were either traditional or some variation of the former left unpainted in the style of the modern wood sculpture style known as Pita Maha that flourished in the village in the 1930s. While the making of traditional masks and Pita Maha style sculpture continued, an increasing number of mask makers, such as Ida Bagus Anom and his older brother Ida Bagus Sutardja, the youngest and eldest sons of Ida Bagus Gelodog, began experimenting with new ideas that caught the imaginations of visitors. As demand grew so did the number of studios producing masks and before long Mas earned the reputation as being the 'village of masks', even if the majority of these were being made for export. As many of the makers learned basic English, they were also contacted by foreign artists and dancers who worked together to create new masks and plays.\n\nWhile rooted in the tradition of Rangda and her accolytes, this pair of demons are early examples of this trend which is recognizable by their exaggerated sizes and expressions. Another new development was the use of real teeth (animal and human) and long curved boar tusks. While the majority of the masks were, like these, more horrific and shocking, others, such as those of Ida Bagus Sutardja, sought to depict more spiritual figures including goddesses. What is certain is that the beautiful polished patinas and natural pigments are can no longer be duplicated as the old laborious methnods of painting and gold leaf have given way to synthetic\u00a0materials.",
    "lat": -8.541481,
    "lng": 115.27515,
    "image": "TP248.jpg"

    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "With large, round eyes, a pointed snout and elastic mouth-and lacking eyebrows, teeth and mustache-this mask clearly gives the impression of a frog than a human. Sangut's name is from anggut, the Balinese word for someone nodding their head in agreement. A variation of this is nyangut, used to describe somewhat who always agrees in front of somewhat but complains from behind, an accurate description of Sangut's\u00a0character.",

  {
    "id": "TP254",
    "nama": "Uludawa , Younger Brother of Delem",
    "tahun": "1930",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Both the mask of Sangut on the left and Delem on the right were made in Puri Gerenceng Palace in Denpasar. The facial color and jewelry, especially the large round ear plugs with four-petal flowers, of both masks is very similar. The real difference is the shape of their mouths. Whereas Delem's is round, Sangut's resembles an animal's muzzle for which reason he is also known as Uludawa or 'long snout&quot;. Known for his quips and wit, Sangut often annoys his older brother Delem by reciting wise parables and reminding him of the better qualities of those on the side of right who have allied against their liege lord Rawana, particularly Prince Rama and his brother Laksmana.\n\nUltimately all four are inextricably connected as opposing halves in a greater cosmic drama that transcends good and bad.\n\nThe second image of Delem to the right, belonged to Marianne van Wessum, a wealthy Dutch heiress and close friend to Walter Spies and Rudolf Bonnet. She would act as the secretary of the Pita Maha artists association after it was found in 1936. With lotus flower earrings, thick gold leaf lines and a long droopy moustache it may have been made in Singapadu. She would kindly donate it to Museum Bali in the early 1950s.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP254.jpg"
  },
  {
    "id": "TP255",
    "nama": "uludawa",
    "tahun": "1930",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "The long and pointy muzzle of this mask clearly shows why Sangut is also known as Uludawa (long snout). In comparison to masks of aristocratic ongin, those of the villages, like this example from Bualu, can be more forceful and animal-like. Made on a limited budget, village masks also tend to lack the expensive gold leaf and cinnabar seen on royal examples. Here we can see that starkness is a defining quality. With simple but strong lines. this Sangut could easily be described as lizard-like in both form and\u00a0complexion.",

  {
    "id": "TP256",
    "nama": "Uludawa, younger brother of Delem",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "In contrast to his egotistical older brother, Sangut is a loquacious character whose banter careens between endless jokes and wise observations for instance, he once reminds his jealous brother that the children of wealthy persons are not necessarily any happier than the poor, as happiness comes from within, not without. Sangut's skinny frame contrasts with his great pot belly, while his small head sits atop a long neck and ends in a point emphasized by a shock of upright hair. Sallow of complexion, he has a long animal-like muzzle. Here he seems to be a happy-go-lucky figure with bright eyes, a friendly expression and open mouth. This mask is from Bualu Village which is located near the neck of the Bukit Peninsula, near today's Nusa Dua\u00a0Hotel\u00a0complex.",

    "image": "TP256.jpg"

  {
    "id": "TP257",
    "nama": "Wana",
    "tahun": "1930",
    "lokasi": "Museum Sonobudoyo, Yogyakarta",
    "deskripsi": "These two masks, together with those on the previous page, belong to the same set originally collected by the Java Instituut, which worked actively in Bali and Lombok, as well as Java.\n\nThey are now in the collection of the Sonobudoyo Museum in Yogyakarta. Consisting of two advisors to the hero Rama, Twalen and Wredah, and two to his adversary, Rawana, Delem and Sangut. Together the four are known as punakawan from the root words panah (to understand) and kawan (friend), thus those who understand their friends. On Bali they are often referred to as penasar from the root word dasar or foundation.\n\nDespite their odd exteriors and comic antics, they are in essence spiritual advisors to kings and princes.",
    "lat": -7.802257,
    "lng": 110.359438,
    "image": "TP257.jpg"
  },
  {
    "id": "TP258",
    "nama": "Nephew of Jatayu",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Sempati is the nephew of Jatayu, the vulture who dies defending Sita as she is kidnapped by the evil king Rawana. A bird of celestial origin, Sempati lost his wings as a child as a result of an accident in a flying contest, in which he flew too close to the sun and his wings were burned off. Upon being informed of the death of his uncle Jatayu, Sempati weeps. He joins Rama's coalition of monkeys and bears (wanara), assembled to invade Alengka. However, being lazy of character, he always shows up late for meetings with Rama.\n\nSempati's ultra-graceful style of dancing is based on Balinese martial arts (pencak silat). As can be seen in this depiction, in some areas of Bali Sempati has not only lost his wings but also resembles a monkey more\u00a0than\u00a0a\u00a0bird.",

    "deskripsi": "The role of wise and mighty sages, who spend most of their time far from the bustle of the courts and cities meditating with their students in forest ashrams, loom large in the Hindu tales of Bali. Awesome beings, often viewed such as Agastya, as incarnations of Lord Siwa himself, they are both dangerous and beneficent coming to the aid of humans in critical times, but also pronouncing terrible curses upon those who disturb them. Recognizable by their elaborate headdresses, seen here tumbling down the sides of his head, exposing black and white checkered kain poleng below, the celadon colored face of this great sage is crossed with merry wrinkles as he opens his mouth wide as if to pronounce a spell or words of wisdom.",

    "deskripsi": "This image of a bucktoothed Sidakarya is considered one of the most sacred in the Sriada family temple. With a roundish face, slit eyes and a gaping mouth exposing his oversized teeth, he seems to be laughing with glee Sida-karya is a reminder that even the most unlikely characters can possess immense\u00a0magical\u00a0powers.",

  {
    "id": "TP262",
    "nama": "Sidakarya",
    "tahun": "1920",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "As masks of other characters or types that fall into sometimes narrow visual parameters, artists have show great versatility in expressing their own vision of the men and women they are portray. Each of these Sidakarya masks shares a pale complexion, narrow curved eyes and big red mouths with oversized forward jutting teeth, yet each of them has its own unique pres-ence. With bushy black eyebrows and a matching unkempt moustache and goatee, the man on the upper left seems younger (Anecdotally the mask was bought for less than a dollar in 1936). In contrast, the white wisp of a beard of his neighbor belongs to an older man, an age more appropriate the original story. On this page, Sidakarya, described as a minister, assumes a more royal stature with golden jewelry, facial lines and better groomed hair. Smiling mischeviously, their intentions are not easy to read. Frits Liefkes, a well respected scholar and curator of antique furniture at the Rijksmuseum, was also a passionate lover of Indonesian art. After his death he would be-queath his considerable collection to the Ethnographic Museum in Leiden",

    "tahun": "17th century",
    "lokasi": "National Museum of Indonesia, Jakarta",
    "deskripsi": "While the vast majority of depictions of Sidakarya have pale white faces, this black faced mask belongs to a rarer and more mysterious type. With upper and lower tusks, white eyebrows, no moustache and gold rimmed eyes, is noteworthy not only for its subtle beauty and expression but also because of the presence of a canggem, a wooden plug on the backside that allows the dancer to hold it in his teeth. It also indicates that the mask, like those in Blahbatuh and Ketewel, could date back to 16th century. Now in the National Museum in Jakarta, it may have been made in Gelgel. Several other ancient masks are found in the Bali\u00a0Museum.",

    "id": "TP267",
    "nama": "Acolyte of Ratu Gede Mecaling, Sisya",
    "tahun": "1936",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Rough-hewn and unpainted, with long disheveled locks made of raffia, these two masks exude a primal power that seems more tribal than Balinese. They were seen by Beryl de Zoete and Walter Spies in the 1930s during a visit to Nusa Penida, the arid island off Bali's south coast, in a performance that took place at the Pura Panataran Dalem Ped Temple. Feared as the abode of Jero Gede Mecaling, the temple is the most sacred on the island. In their book, de Zoete and Spies described the performance as the simplest form of the Barong Rangda Dance with a minimalistic plot recounting the invasion of South Bali by Rangda and her minions. The havoc they wreak is remedied by the creation of Jero Gede, the Barong (1938, 99). The mask on these two pages depicts one of Rangda's acolytes (sisya). With long tusks and large teeth, the fanged queen herself (Ratu Gede Mecaling) is seen on the next two pages. Both masks are illustrated in Dance and Drama in Bali (de Zoete, Spies, 1938, plate 112). Spies felt they were so important that he purchased and donated them to the Museum Bali in 1936 where they still can\u00a0be\u00a0seen.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP267.jpg"
  },
  {
    "id": "TP268",
    "nama": "Acolyte of Rangda",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Rangda and her disciples are usually immediately recognizable by their bulging eyes, tusks, flames and long tongues, the latter which are not present on any of the masks on these two pages. In some cases they have been lost, in others they may have never existed. The high eyebrows representing flames are typical for Rangda masks from Buleleng and Bangli. The first masks and statues collected on the island were from the north, which came under the suzerainty of the colonial government of Netherlands Indie in the middle of the 19th century and remained Bali's capital until 1958. It appears that her tongue\u00a0was\u00a0lost.",

    "tahun": "19th century",

    "deskripsi": "With intense dark pupils, swirling gold flames cut from water buffalo hide shooting out of the sides of her mouth, long upward-thrusting tusks and two prominent horns at the top of her head, this is an imposing mask of an unidentified member of Rangda's coven of witches. It was purchased for the museum on May, 15, 1936 for the price of three Dutch florins (equivalent to a little over one US dollar now). Sacred masks were never easy to buy. This temple mask was probably decommisioned and sold because it has been damaged. This would change when mask makers began accepting commissions.",

    "id": "TP270",

    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "While most have conflated actual masks of Rangda with those of her many students, they, too, are important characters in their own right. Considered masters of the magic of the left, each of them each specialized in different branches of sinister spells and curses. They would join together in cemeteries and other luguber places at night and dance wildly in the presence of Ratu Gede Mecaling and Bhatari Durga, the goddess of the underworld. Inevitably they would be confronted by the Barong who would thwart their evil\u00a0designs.",

  {
    "id": "TP271",
    "nama": "Acolyte of Ratu Gede Mecaling, Sisya",
    "tahun": "1930",
    "lokasi": "private collection, mas",
    "deskripsi": "Although she shares the same features as most of Rangd'a acolytes-a red complexion, curved tusks, fangs, protruding teeth, bulbous eyes and Bared nostrils this mask stands out for her nearly round face shape. She also lacks the characteristic long flaming tongue. The red pigment seems to be iron oxide, a cheaper substitute for cinnabar. Likewise, yellow paint has been used in place of gold leaf. It has been suggested that the mask is from a more provincial area, perhaps in the mountains. Nonetheless it is an unique and powerful example of the Balinese ability to play with forms and color even with simple materials.",

    "id": "TP274",
    "nama": "Sandaran, Male Sandaran, Gandharva",
    "tahun": "1930",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "While Telek is the name used in Denpasar, the people of the beach village of Sanur, which has long been dominated by members of the priestly caste (brahmana), prefer Sandaran. Whereas the origin of telek is unclear, sandaran is derived from Gandharva, the Sanskrit name of a celestial race of males. They, like apsarum, are famed musicians and entertainers, who serve the gods. Gandharva are also relatives of Yaksha (from whence raksasa), usually dangerous nature spirits of demonic origin, which is not true of apsarum. This particular mask with its haughty expression and wavy moustache leaves little doubt of its\u00a0sex.",

    "deskripsi": "Unlike female Telek Luh, males are Gandhavan, who have demonic blood. This perhaps explains why they appear in Calonarang and Rarung dances held along the coastal regions of South Bali. Maleness is suggested by the intensity of the eyes and forceful features and expression. The tear-shaped earrings are also usually worn by men already in statuary dating back to the 14th century. Some have identified the mask as an early work of Ida Pedanda Sidemen of Sanur before he began experimenting in a more realistic style.",

    "deskripsi": "While the complexions of Telek and Sandaran vary from chalky white to yellows and tans, the dark brown color of this mask is unusual. Wearing extensive jewelry including large gold earrings, a diadem with repousse floral patterns and golden blossoms including two tubular sweet smelling cempaka flowers in his hair, this small mask with its red rimmed eyes, grey cornea and pearly teeth, is a classic Sandaran except for the brown skin tone. While artists are given leeway to experiment and express themselves the boundanes for this were usually narrow.",

    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "This exquisitely delicate mask captures all the mystery and beauty of this sacred mask tradition. Representing celestial maidens, Telek Luh, are representations of apsarum, a celestial race of musicians and dancers who entertain the gods. With a flawless cream-colored complexion, delicately arching eyebrows, lively eyes lined in red, aquiline nose and an enigmatic ruby red smile exposing a row of golden upper teeth, the mask has been attributed to I Gusti Putu Kandel, a royal mask maker from a palace located behind today's Bali Museum, whose reliefs he carved in the 1920s, along with fellow mask makers, I Gusti Made Gede of Puri Gerenceng Palace and Ida Pedanda Made Sidemen of Sanur. The title Luh is from the word luwih, which means beautiful. It is used for women.",

    "deskripsi": "With a polished, enamel-like surfaces, perfect features accentuated with red and black lines of make-up and golden teeth and hair decorations In the shape of four-petal flowers, these masks are show the exquisite mastery of Denpasar's master sculptors, who were themselves often performers. Whereas a connection with apsarum a celestial race of female dancers known to Hindus and Buddhists is not in doubt, time and changing religious orthodoxy after the rise Shaivite hierarchy added new layers and interpretations in particular a purely Hindu origin from the Mahabharata story about the Churning of Amerta, the elixir of immortality (Bandem, 1983, 139-140)",

    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "While the majority of telek masks display a flawless and benign beauty, some such as the two on these pages are emotionally more enigmatic. This is mirrored in de Zoete and Spies' observation that sandaran (the pair do not really make a distinction between the two) are not symbols of benevolence but rather&quot;...a small, ethereal variety of Djauk....&quot; (1938, 99). Of course this comment was made in part because both jauk and sandaran wear the same tiered headdresses. So, too, telek and sandaran are not always angelic in appearance. This is true of the mask on the left who stares forward intensely with with pronounced facial lines and an ambiguous smile Notably her teeth are not gold but were inlaid with now missing mother of pearl.",

    "deskripsi": "The complexion of this Telek mask is a dark shade of tan, rather than the usual white. Elegantly shaped with fine, gently arched eyebrows, an aquiline nose and high cheekbones, it displays an almost intense alertness, staring wide-eyed directly at the audience. The hint of a smile, with a slightly open mouth exposing a well-formed row of golden upper teeth, is reminiscent of Majapahit sculpture. A band of golden flowers rings the crown.",

    "deskripsi": "The large number of Telek and Sandaran masks found in old collections, reflects how much they intrigued European visitors before the war. This was not only because of their beauty and delicacy but also their mysterious nature. Whereas the complexion of the mask on the left is yellowish, a sign of high birth, that on the right is terracotta, suggesting lower status. The hair decorations on one are four petal flowers, the other golden rondels.",

    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Despite the wear, caused by frequent use, this mask, with its ghostly white complexion and otherworldly aura epitomizes the style of Telek masks of the pre-colonial era. Like all Telek, it is small, a characteristic also shared with archaic Javanese masks. With a ring of golden flowers wrapped around its crown and a thin gold line along its hairline, it has been attributed to I Gusti Putu Kandel of Puri Abasan Palace, which along with Puri Gerenceng. was a center of traditional arts and art school serving the mighty princes of Badung before they were defeated by the Dutch colonial troops\u00a0in\u00a01906.",

    "tahun": "1930",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Among the many prewar Telek and Sandaran masks that have en-tered various museums and private collections before World War Two, there are quite a few that are, like these, largely unpainted, As the wooden faces are finely polished, there seems little doubt that this choice was intentional. There are several possible answers as to why. The most difficult to ascertain if it was traditional or the result of outside influence. Both masks, which are in the collection of the Bali Museum have been attributed to I Gusti Made Gede of Puri Gerenceng, Pemecutan, which was also a center of unpainted wood sculptures made for the tourist market since the late 1920s. While it is possible that Walter Spies, who was a friend of Gusti Made and also a frequent visitor to the palace may have recommended leav-ing them unpainted, the wear on them indicates they were used for dance not for sale as souvenirs.",

    "deskripsi": "Born a raksasa demon, Trijata is the daughter of Rawana's brother Wibisana, who allies himself with Rama after his brother the sorcerer and villain of the Ramayana Epic, refuses to follow his advice and return the kidnapped Sita to her husband Rama. While she is held captive in Alengka, Trijata becomes the guard, companion and confident of Sita, providing her with information about her husband, and preventing her from committing suicide during a moment of despair. After Rama's victory, she is rewarded by Rama for her kindness. In this, another masterpiece of Ida Pedanda Sidemen, we see another more forceful side of female beauty that mirrors Trijata's demon ancestry.",

    "id": "TP292",

    "tahun": "1940",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Twalen is a mysterious figure. Immensely powerful, he rarely displays his might and rarely engages in brute force or showy open displays of magic, choosing instead to influence circumstances by more subtle means. He is aided in this by his exceptionally plain, if not ugly exterior, that often causes his foes to underestimate him at their own peril. While all of them share the same black complexions, jutting jaws, full lips with small noses, the one on the previous page has wild eyebrows. The mask was bought by the museum from Rolf Neuhaus, one of the two German brothers who opened an aquarium and the Toko Neuhaus art gallery on Sanur Beach in the 1930s. The image of Twalen on this page is notable for the very large urna plate, a symbol of status and spiritual power, worn over his third eye The mask displays Chinese features, in particular the long drooping white moustache that looks like the one worn by the Daoist priest Lao Tse. It is possible a reference to Chinese influence on the court and local economy. In contrast, the early jet black mask on the opposite page lacks all finery. Instead it exudes the same primal energy of 16th century Semar masks (vol. 1. pages 128, 129) in the Gadjah Mada set now in Puri Ageng Blahbatuh.",

        const map = L.map('map').setView([-8.409518, 115.188916], 9);

        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        });

        const baseMaps = {
            "OpenStreetMap Peta": osmLayer,
            "Satelit (Esri Imagery)": satelliteLayer
        };
        L.control.layers(baseMaps, null, { position: 'topleft' }).addTo(map);

        const markersCluster = L.markerClusterGroup();
        const markerMap = {};

        function renderSistem(filterText = '') {
            const listContainer = document.getElementById('list-items');
            listContainer.innerHTML = '';
            markersCluster.clearLayers();

            const query = filterText.toLowerCase();

            dataTopeng.forEach(item => {
                if (item.nama.toLowerCase().includes(query) || item.lokasi.toLowerCase().includes(query)) {
                    
                    const popupHTML = `
                        <div class="popup-card">
                            <h3>${item.nama}</h3>
                            <table>
                                <tr><td class="label">ID Topeng</td><td>: ${item.id}</td></tr>
                                <tr><td class="label">Tahun</td><td>: ${item.tahun || '-'}</td></tr>
                                <tr><td class="label">Lokasi</td><td>: ${item.lokasi}</td></tr>
                            </table>
                            <div class="desc">${item.deskripsi || 'Tidak ada deskripsi.'}</div>
                            <img src="images/${item.image}" onerror="this.src='https://placehold.co/300x200?text=Foto+'+item.id" alt="${item.nama}">
                        </div>
                    `;

                    const marker = L.marker([item.lat, item.lng]).bindPopup(popupHTML);
                    markersCluster.addLayer(marker);
                    markerMap[item.id] = marker;

                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'topeng-item';
                    itemDiv.innerHTML = `
                        <h4>[${item.id}] ${item.nama}</h4>
                        <p>ðŸ“  ${item.lokasi} (${item.tahun || 'Tahun -'})</p>
                    `;
                    
                    itemDiv.onclick = function() {
                        map.setView([item.lat, item.lng], 14);
                        marker.openPopup();
                    };
                    
                    listContainer.appendChild(itemDiv);
                }
            });

            map.addLayer(markersCluster);
        }

        document.getElementById('search-input').addEventListener('input', function(e) {
            renderSistem(e.target.value);
        });

        renderSistem();
    </script>
