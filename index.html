    "id": "TP028",

    "tahun": "1900",
    "lokasi": "Puri Gerenceng Palace, Denpasar",
    "deskripsi": "Basuki and Anantaboga are primordial naga dragons, held sacred by Hindus and Buddhists. They are the rarest type of Barong masks. Both of these pairs were originally used a top huge kites (janggan) in the form of naga flown during the wind season, which lasts from July until September. The ones above are the creations of I Gusti Made Gede one of Bali's most acclaimed artists in the 19th and early 20th century. The second pair, to the right, were collected in Ubud. These mythological creatures play an important role in Balinese myth and religion. Bali itself is said to rest on the backs of a cosmic turtle, Bedawang Nala intertwined with the twisted bodies of Basuki and Anantaboga floating upon a cosmic ocean. Earthquakes are caused when the naga move suddenly. The pair also play a key role in the story of the churning of the ocean of milk to create the nectar of immortality when the gods and demons use them as ropes to stir the sea until the magical liquid, tirta amerta, appears.",

    "id": "TP030",
    "nama": "I gusti Ayu Bebed Luh, Ken Bebed",
    "tahun": "-",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "| Gusti Ayu Bebed Luh was the daughter the distinguished Majapahit minister, Ki Gusti Pinatih. She was betrothed to Gadjah Mada, the puissant prime minister of the Majapahit Empire, in an arranged marriage. As she was unable to bear him a child, Gadjah Mada took a second wife, Ni Luh Ayu Sekarini, the daughter of a high priest on Bali. After he returned to the Javanese capital, she remained on in Bali and unbeknownst to Gadjah Mada, bore him a son who she named Aria Bebed. When he came of age, she finally told him who his father was. Later he would join the Majapahit court and became a local official in North Bali. There is a shrine (Prasasti Aria Bebed) dedicated to him in Bububan Village. Here, Gusti Ayu Bebed is depicted as a princess with a round face, white complexion and fine features befitting a proud character of aristocratic status.",

  {
    "id": "TP031",
    "nama": "I Gusti Ayu Bebed Luh, Ida Ayu Bebed Luh",
    "tahun": "1930",
    "lokasi": "Museum of Puro Mangkunegaran, Solo",
    "deskripsi": "With a perfect white complexion and a beauty mark on the left side, fine arched eyebrows, aquiline nose, ruby red lips and a golden diadem, I Gusti Ayu Bebed Luh is the epitome of a high caste beauty about whom several stories are told. The daughter of Ki Gusti Pinatih, a minister in the court, she would catch the eye of Gadjah Mada, who took her as his first wife. She is credited for having been one of his most important advisors over the years. Unable to bear children, her husband married another girl, Ni Luh Ayu Sekarini, during the Bali campaign who unknown to either of them gave birth to a boy, named Aria Bebed, in honor of I Gusti Ayu Bebed Luh. Sekarini would only reveal the name of his father after he came of age, whereupon he sat before the door of Gadjah Mada's palace and demanded to meet his father. After an interrogation, Gadjah Mada affirmed the veracity of his claim, acknowledged him as his son and appointed him to a position at the court.",

  {
    "id": "TP032",
    "nama": "King Beda Ulu",
    "tahun": "1930",
    "lokasi": "Collection of the Griya Pidada Family Temple, Klungkung",
    "deskripsi": "In this well-worn portrait of Beda Ulu, the swine-headed raja of Bali at the time of the Majapahit invasion of the island in 1342, Kerebuak has created a perfect balance between the features of a strong king and a fearsome jungle beast with a shockingly flat red nose, fangs and tusks. While disparaged as a black magician who's abuse of the dark arts resulted in his the replacement of his true visage with that of an animal, there is a tragic side to the fall of Beda Ulu, who never stood a chance against the might of a far more powerful and cunning enemy. Notably he would not perish in the war but flee in shame leaving no trace of his whereabouts.",

  {
    "id": "TP033",

    "tahun": "-",
    "lokasi": "I Made Nyarikan Sriada Family Temple, Denpasar",
    "deskripsi": "Whereas most masks depicting Beda Ulu are far more pig-like than human, in this case other than a flat snout that exposes his nostril holes and two fangs on the sides of his mouth, here the despised king of Bali defeated by the invading Majapahit army in 1343, is more of an unattractive angry man than a fearsome wild boar. What is certain is that after his defeat, the Majapahit were more than happy to paint an ugly picture of the deposed king, an uncouth and evil sorcerer who supposedly fled in shame after his subjects learned he had the head of a pig.",

  {

    "lokasi": "Private Collection, Bali",
    "deskripsi": "Beda Ulu, the king of Bali at the time of the Majapahit invasion in 1343, was labeled a cruel and uncivilized villain and master of the dark arts. As if that was not enough, he was also said to have the head of a wild boar from whence his nickname Beda Ulu or 'different head'. Facing overwhelming odds from an aggressive Imperial neighbor, the outcome of the conflict was never in doubt although one can suspect that the stories about Bali's last independent king were the result of propaganda. As they say, history is written by the victor.",

    "id": "TP035",

    "tahun": "1930",
    "lokasi": "Museum Sonobudoyo, Yogyakarta",
    "deskripsi": "With a white complexion, wide open eyes staring ahead with intensity flared nostrils, moustache and grinning mouth, in the original notes of the Java Institute (1919-1942), it is described as a Jauk Bendesa or Jauk who was also a village headman. In 1935 the institute's collection, which included Balinese as well as Javanese artifacts, was moved to its current location near the royal palace of the sultan of Yogyakarta. Officially named Kayu Winayangan ing Brahman Budha, this was shortened by most to Sonobudoyo. Although the Java Institute was disbanded at the time of the Japanese invasion, the responsibility for Sonobudoyo was given to local officials until 1974 when it became a national museum.",

    "id": "TP036",

    "tahun": "1920",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Bhagawan Wraspati was a Shaivite high priest whose knowledge was so great that he became teacher to the gods, or Guru Para Dewa. Living in isolation in a mountain retreat he specialized in mystical practices that released his disciples from illusion (maya) and the cycle of rebirth into a state of full realization of consciousness (moksa). Mask-maker Ida Pedanda Sidemen was also a Shaivite priest renowned for his deep wisdom and mastery of arcane magic. His masks are celebrated not only for their liveliness-seen here in the eyes full of mirth and slight smile-but also his mastery of colors in this case blue-green, the color of Siwa and bright cinnabar lips.",

  {

    "tahun": "-",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Begawan Uraspati was an enlightened saint who, as a result of his deep meditations (tapas), rose to Indraloka, the heavenly realm, where the gods themselves became his students. Here Uraspati is depicted as a forceful man with thick eyebrows and mustache. He was a devotee of Iswara (the Lord of the World), an incarnation of Siwa, with whom he shares his blue skin colour. Married to three women, he had a son called Bharadwaja, who also became a great sage. Bharadwaja in turn fathered Drona, the great warrior and preceptor of the Korawa and Pandawa brothers in the Mahabharata Epic.",

    "deskripsi": "The son of Dewi Kunti and Bayu, the god of wind, Bima is the largest and most powerful of the Pandawa brothers, the heroes of the Mahabharata. His rough of character and quick temper, is signaled by a dark complexion, coarse features and wiry hair. Despite his fearsome exterior, which contrasted with his more civilized brothers, he was good hearted and kind. Bima is also the half-brother of Anoman, the white monkey",

  {
    "id": "TP039",
    "nama": "Bondres Peceng, One-Eyed Clown Mask",
    "tahun": "-",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Typically for a Bondres clown, this mask twists the normal symmetry of the human face out of place. The missing eye on the right is compensated by the enormous one on the left, while the teeth are also deformed. Despite this, and perhaps aided by its flesh-colored complexion, this mask lacks the horrific aspect of many other Bondres.\n\nAccording to museum notes, this mask was used by the nobles of Puri Satrya Palace in Denpasar during grand ceremonies, indicating that it was held in high esteem. Puri Satrya or Satria was the local name for Puri Agung, the main palace of Badung or Denpasar, which was destroyed with great loss of life during the Dutch colonial invasion of September 1906. Stylistically, the quality of workmanship and other clues suggest that this mask was one of a group of sacred masks that were owned by or performed in Puri Agung Badung before its destruction that ended with the looting of treasures by the Dutch as well as locals. The history of the masks after the Puputan that marked the end of the kingdom of Badung is unknown until they were accessioned to the museum in 1938.",

    "lng": 4.483984,

    "tahun": "-",
    "lokasi": "Private Collection, Mas",
    "deskripsi": "Blind in one eye, with a misshapen face and huge earplugs (subeng) inlaid with Chinese porcelain, Gandi falls into the archetype of the coarse comic handmaiden to a usually vacuous princess. To the delight of the audience, she fearlessly hurls insults, ribald humor and razor-sharp criticism whenever and wherever she sees fit. Her character serves as a comic counterpoint in the Calonarang story.\nThe use of curves and round forms in this expressive mask are the work of a true master.",

    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Another misshapen half mask of a comical maid in waiting. Half masks al-low dancers to speak unimpeded. This particular character, known as Luh Peceng, represents an eccentric woman, blind in one eye, who bears the scars of a severe case of smallpox she suffered as a young girl. Despite her physical deformities she also wears jewelry including earplugs, a red and golden hair ornament in the shape of a lotus flower and a ring of blossoms in her hair. Foul-mouthed, quick of wit and uncouth, Luh Peceng is extremely popular with audiences.",

    "tahun": "1938",
    "lokasi": "Private Collection, Bali",
    "deskripsi": "Pug nosed with sharp arching eyebrows, a rectangular mouth with an uneven row of top teeth and large mole on her left cheek, this Bondres appears rough and tumble despite her large golden earplugs, well coiffured hairdo and a dot on her third eye. Masters of low Balinese, Bondres engage in everything from wicked gossip to throwing shade on rivals real and perceived. Sometimes, as here, the eyeholes are large allowing the dancers eyes to peer through. This allows the dancer to move the eyes more expressively.",

    "tahun": "-",
    "lokasi": "Private Collection, Bali",
    "deskripsi": "This maidservant's lower status is mirrored by her dark reddish-brown complexion, which usually signals common birth. Despite this or perhaps because of it, the Balinese, who are themselves 85% wong jaba, literally outside the three higher castes, often adore these clown-like figures who speak in the vernacular. So, too, while many are bumblers akin to vaudeville slapstick performers, others are intelligent and cunning. Despite her ancestry, as a servant of the court, this bondres has golden earrings, a third eye ornament and row of upper teeth.",

  {
    "id": "TP044",
    "nama": "Bondres Peceng Aneh, Old Eccentric Man with One Eye",
    "tahun": "1930",
    "lokasi": "Private Collection, France",
    "deskripsi": "This depiction of an older, eccentric clown figure (bondres) is a study in asymmetrical composition. Facial lines marking the vicissitudes of time are interwoven with his human imperfections, the impact enhanced by the silver-gray color of his skin and bright red lips. The mingling of Klungkung and Batuan influences came about when master mask-maker | Dewa Putu Kebes of Klungkung decided to move to his wife's home village of Batuan after she fell seriously ill. He remained in Batuan and exercised considerable influence over not only the Batuan style but also the nearby Singapadu and Sukawati styles.",

    "deskripsi": "Disease masks are one genre of masks on Bali. According to the description this pock-marked man with bulging cheeks and wispy facial hair, was a victim of chickenpox. Such masks may have originated from early exorcistic dances that sought to drive away the spirits causing maladies.",

  {
    "id": "TP047",
    "nama": "Man with Pockmarked Face",
    "tahun": "1938",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Field notes describe this folkloric mask with bushy eyebrows, mustache and dark, olive-toned skin marred by white spots as a soldier. Lacking the finesse of courtly masks, it is a reminder that mask-making and dancing also flourished in remote regions without royal patronage, especially in mountains. Disease masks like this one belong to older animistic traditions that believed the masks could dispel the evil spirits that cause sickness. The white spots certainly represent smallpox scars, an illness that regularly struck Bali's population. Assuming the solider description is accurate, it might also signify the hardship and dangers of frequent internecine warfare, for which commoners were often pressed into military service by their chieftains and lords.",

    "tahun": "1938",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "While the Balinese idealize good looks, they also never shy away from showing those not blessed by beauty and even, as here, deformed. Many of these characters are bumbling fools, but some are wise and crafty advisors to their kings. At the time it was collected in 1938, this mask was said to represent a soldier, despite having a wall-eye which would have been a considerable handicap in battle. The mask-maker has even used red on the eyelids to further emphasize the eye issue. The skewed eyes, dark tan complexion, asymmetrical eyebrows, and triangular goatee give the impression of a sly personage looking for advantage.",

  {
    "id": "TP049",
    "nama": "Deformed Guard of the Palace of I Gusti Panji Sakti",
    "tahun": "19th century",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "This large, grim-faced mask of a snarling, deformed man with a dark olive complexion is described in field notes as a gatekeeper at the palace of Gusti Pande. The latter is most probably a misspelling of Ki Gusti Anglurah Panji Sakti, the heroic aristocrat who founded the kingdom of Buleleng in the 17th century after defeating Javanese Muslim invaders. Panji Sakti established his capital in Singaraja, where he built a large palace known as Puri Agung Singaraja or Puri Gede Buleleng. The mask was certainly used in sacred historical dances recounting the deeds and exploits of this Balinese hero.",

  {
    "id": "TP050",
    "nama": "Bondres, Eccentric Clown",
    "tahun": "1920",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "All three of these masks depict angry men seemingly shouting at unseen protagonists. The one to the left is made of simple materials with stiff bristles and a gaping mouth with missing teeth. It is a folkloric reminder that mask traditions existed on every level of society. The examples to the left, are stunning examples of a new realistic style driven by master artists like Kerebuak of Klungking who expanded not only the boundaries of masks but also the performance arts for, in many cases makers were also talented dancers. Although such masks do not fit easily into specific categories, they are members of a group that are more studies of emotional states, in this case outrage bordering on aggression. Whereas one has pronounced facial lines with a gaping mouth and overlarge teeth. The appearance of a tongue in the second is very unusual.",

    "tahun": "1950",
    "lokasi": "Private Collection, USA",
    "deskripsi": "Whereas many bondres masks depict buffoons and busybodies, some are of a more malevolent disposition, as seen here. Sneering from a crooked open mouth that exposes a row of broken teeth, this bondres' sense of malice is amplified by large eye holes that allow the dancer to truly animate the character.\nThis mask is attributed to Banjar Gemeh in Badung (the Balinese name for Denpasar) because of a similar mask in the collection of Nyarikan Sriada. Such pinpoint identification of provenance is a reminder that particular styles often originated with one carver, and would radiate out from them to others in the immediate vicinity, or even surrounding regions.",

    "deskripsi": "Half red and half white, this dramatic mask of a pug nosed man with a deformed face and unkept hair is an unusual and noteworthy example of the outlier. Bondres masks play a critical role in Topeng Pajegan and Panca performances as a comic counterpoint. Combining rude behavior with coarse language, cutting repartee and slapstick, the best performers-capable of instantaneous biting and witty remarks are so popular that they are akin to celebrities. Dancers using such masks also imitate the speech patterns of the handcapped.",

    "id": "TP060",

    "tahun": "1930",
    "lokasi": "Private Collection, USA",
    "deskripsi": "With a wrinkled face, concerned look with popping eyes (nelik) and copious moustache, this sibakan half mask, depicts a village headman. Such half-masks usually depicting commoners as well as outliers, play a comic role as bondres or penasar, those all to ready to meddle in affairs and make outrageously impolite comments. While comic half masks have a long history, this particularly expressive style was created by the legendary mask-maker, I Dewa Putu Kebes of Batuan. This probably began sometime at the end of the 19th century and would continue to evolve into even more extreme varieties. The style was a great hit and adopted by fellow mask-makers in the nearby villages of Singapadu and Sukawati.",

    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Half-masks are the domain of penasar. These characters, belong to the rough-and-tumble world of commoners and have presumably suffered the same hardship and poverty as the majority of the audience. Although they speak in the low language and are often unspeakably raw and rude, penasar also embody a high degree of folk humor and wisdom that stands in contrast to the refined behavior of princes and courtiers. Here, the mask-maker emphasizes strength of character through worry lines, wrinkles and the concerned look in the clown's eyes.",

    "deskripsi": "This mysterious white-faced mask shows a man with narrow eyes, a refined nose and an enigmatic V-shaped smile. While the hair on top of his head is unkempt and his eyebrows are bushy, he has a neat mustache and goatee. The shape of the eyes and complexion are reminiscent of Sidakarya and Barong Landung masks. There is also a mouth plug (canggem) carved into the back of the mask, so that the dancer can hold it with his mouth. This convention is found only on the oldest Balinese masks. It is possible that this is a sacred mask depicting a character in an historical story (Topeng Wali or Bebali Babad).",

    "tahun": "1920",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "The story of the twin brothers Cupak and Grantang has long served as a popular morality play on Bali. Lazy, greedy and evil-minded, Cupak uses his seniority to abuse his handsome, strong and good-hearted younger broth-er Grantang, who respectfully defers to him despite the injustice. Unbe-knownst to either, they were created by the god Batara Brahmana to help the Raja of the Javanese kingdom of Daha defeat the raksasa demon Detya Benaru, who had kidnapped his daughter. When Cupak hears that the king is offering the hand of his beautiful daughter to the hero who can save her, he tricks Grantang into defeating the demon, only to claim the princess for himself. As seen in the mask, Cupak is ugly and badly groomed, causing the princess to recoil from his advances. In the end, he is exposed and the noble Grantang prevails.",

    "deskripsi": "Dalem is the archetype of the noble prince that can be used to play any number of historical characters from different stories. Handsome, alert and serious, his features are graceful, with bright eyes, nose and full lips accented by a thin mustache. His black hair, combed back, contrasts with the warm hue of his naturally-colored complexion. The gold floral roundels with inlaid pink sapphires on his crown, temples and third eye were added at a later date. This is one of twelve sacred masks made and used by Ida Bagus Oka Kerebuak. Considered spiritual heirlooms, they are now in the family temple of Griya Pidada.",

    "id": "TP066",

    "tahun": "1948",
    "lokasi": "Private Collection, Bali",
    "deskripsi": "Dalem Arsa Wijaya is the Balinese archetype of a heroic prince. His aristocratic status is mirrored in his white complexion, refined features and noble expression. This mask was presented by Anak Agung Ketut Ngurah, the raja of Bangli, to I Made Keredek (the father of I Made Bandem) in the early 1950s in recognition of this talents as a Topeng Panca dancer, who often performed in Bangli. While the jewelry in the hair is carved directly into the wood with the addition of gold leaf, the urna, third eye, between the eyebrows is actually made of gold affixed to the mask. The addition of metallic ornaments, silver or gold and inlaid with stones or glass only became popular in the 1950s.",

    "nama": "Raden Wijaya, Kertarajasa Jayawardana",
    "tahun": "-",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "In Topeng Pajegan and Panca, Arsa Wijaya or Dalem is usually the archetype of the just ruler, used to play any number of historical roles. Although this mask is described in museum records as Arsa Wijaya, in this case it is a reference to Raden Wijaya, the founder and first raja of the Majapahit Empire. Here Raden Wijaya is shown in full glory as a handsome high noble resembling Rama, the hero of the Ramayana Epic. He has a white complexion, well-formed features and bright eyes. His immaculately curved moustache and full red lips dis-play his vigor. The two large golden ornaments encrusted with rubies (urna, cudamani) above his third eye symbolize his inner mystical power (sakti) and royal status. He is crowned by a ring of golden flowers. This mask belongs to a special class of sacred masks known as Topeng Wali or Bebali. They are performed only on special occasions, such as at the investiture ceremonies of high priests (pedanda). These ceremonies involve the ritual death of the candidate and his rebirth as priest, who is given a new name and thereafter considered twice born (dwijati).",

    "id": "TP069",
    "nama": "Raden Panji",
    "tahun": "19th century",
    "lokasi": "National Museum of Indonesia, Jakarta",
    "deskripsi": "The Malat Cycle, a 12th century medieval poem, consists of several stories about Panji Amalat Rasmi, the king of Jenggala, and his wife, Princess Dyah Ratna Merta, queen of Kediri. In one, the crown prince Panji denounces his titles and leaves the kingdom after his father refuses to allow him to marry the girl he loves. Worried by his absence, the king sends Kebo Angun-Angun to find his son. His search is fruitless but as he returns he encounters a man, Carang Naga Puspa, who provokes an argument that nearly erupts into a fight before Angun-Angun realizes that he is Panji in disguise. After the king relented and allowed him to marry Dyah, Panji would finally return to Janggala and later ascend the throne, appointing Angun-Angun, shown here as a mature, but somewhat tired aristocrat of high standing, as his prime minister.\n\nAccessioned to today's National Museum at an early date, an inscription on the back of the mask to the left reads, &quot;made by Ida Bagus Putu Rai of Tabanan&quot; followed by a mantra, &quot;May the spirit of Siwa and Pasupati invest this mask with magical power (taksu).&quot; In addition it identifies this exquisite depiction of a vigorous and handsome young aristocrat as Dalem Panji or King Panji. With intense but compassionate eyes, well-formed features, a dashing moustache, open smiling mouth, red lips and pearly teeth, the portrait is a masterpiece. It is an all the more remarkable find because it is the creation of a previously unknown master from Tabanan, a regency not well known for mask making, sobering proof how much more there is to learn about this ancient art. While now largely sidelined, it should be remembered that the Malat Cycle so resonated with the people of Southeast Asia that it influenced performance arts not only on Java and Bali but also Sumatra, Sulawesi, the Malay Peninsula, Thailand and",

    "lng": 106.821815,
    "image": "TP069.jpg"

    "deskripsi": "The use of multiple parallel lines on this mask are reminiscent of the 16th century Semar masks of Blahbatuh.\n\nThe same set also includes the earliest example of the Sidakarya type, a strange man with a scrunched up face, narrow curved eyes and buckteeth, which is identified not as Sidakarya but I Dewa Tarukan (vol. 1, pages 146-147), a Balinese historical figure who has nothing to do with the Javanese Buddhist priest, who cursed the Eka Dasa Rudra.",

  {
    "id": "TP071",
    "nama": "Dalem Sidakarya",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "As masks of other characters or types that fall into sometimes narrow visual parameters, artists have show great versatility in expressing their own vision of the men and women they are portray. Each of these Sidakarya masks shares a pale complexion, narrow curved eyes and big red mouths with oversized forward jutting teeth, yet each of them has its own unique pres-ence. With bushy black eyebrows and a matching unkempt moustache and goatee, the man on the upper left seems younger (Anecdotally the mask was bought for less than a dollar in 1936). In contrast, the white wisp of a beard of his neighbor belongs to an older man, an age more appropriate the original story. On this page, Sidakarya, described as a minister, assumes a more royal stature with golden jewelry, facial lines and better groomed hair. Smiling mischeviously, their intentions are not easy to read. Frits Liefkes, a well respected scholar and curator of antique furniture at the Rijksmuseum, was also a passionate lover of Indonesian art. After his death he would be-queath his considerable collection to the Ethnographic Museum in Leiden",

  {
    "id": "TP072",
    "nama": "Delem, Chief Advisor to King Rawana",
    "tahun": "1930",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Both the mask of Sangut on the left and Delem on the right were made in Puri Gerenceng Palace in Denpasar. The facial color and jewelry, especially the large round ear plugs with four-petal flowers, of both masks is very similar. The real difference is the shape of their mouths. Whereas Delem's is round, Sangut's resembles an animal's muzzle for which reason he is also known as Uludawa or 'long snout&quot;. Known for his quips and wit, Sangut often annoys his older brother Delem by reciting wise parables and reminding him of the better qualities of those on the side of right who have allied against their liege lord Rawana, particularly Prince Rama and his brother Laksmana.\n\nUltimately all four are inextricably connected as opposing halves in a greater cosmic drama that transcends good and bad.\n\nThe second image of Delem to the right, belonged to Marianne van Wessum, a wealthy Dutch heiress and close friend to Walter Spies and Rudolf Bonnet. She would act as the secretary of the Pita Maha artists association after it was found in 1936. With lotus flower earrings, thick gold leaf lines and a long droopy moustache it may have been made in Singapadu. She would kindly donate it to Museum Bali in the early 1950s.",

    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Wayang Wong depictions of the punakawan clowns who serve Prince Rama and King Rawana, the implacable rivals of the Ramayana Epic, are often liberally painted with cinnabar and gold leaf. As a prosperous royal capital enriched by enormous rice fields and trade, the lords of Denpasar were great patrons of the arts. Sadly, the once great Wayang Wong troupes of the past began waning in the late 19th century and largely crash with the colonial era. While Wayang Wong masks were still being produced, the troupes that wore them had largely disappeared by the end of World War Two.",

    "tahun": "1930",
    "lokasi": "Museum Sonobudoyo, Yogyakarta",
    "deskripsi": "Wearing large golden rondels (subeng) in his earlobes and with a hint of a smile and his lips, this is one of the more flattering depictions of Delem, chief advisor to the villainous Rawana. Scorned for his pompous ignorance and vainglorious arrogance, time and time again Delem's whisperings to the monarch inevitably result in disaster. On the opposite page an amused grey faced Twalen with a wrinkled forehead and pug nose looks downwards as if he is studying some object. As all the Wayang Wong in the collection of Sonobudoyo Museum, these masks were original bought by the Java Instituut. While the chances are that they were made in Denpasar, the wealthy and cultivated capital of Badung, they also resemble the royal style of Klungkung not surprising because of the lively cultural exchange among traveling dance troupes and dancers whose fame began spreading beyond",

    "deskripsi": "With an animal-like face resembling a frog, Delem is the main advisor to the evil protagonist in multiple stories. Vain and full of himself, Delem does all he can to please his lord, often leading him straight to disaster. He is one of four clown-like figures that appear in the dances-two on the side of good, and two on the side of evil. All four serve several important functions during performances, including the translation of the stories into the vernacular, and above all, the use of slapstick comedy and bawdy banter to offset the serious undercurrents of the main narrative.",

    "id": "TP077",
    "nama": "Dewi Sita",
    "tahun": "1935",
    "lokasi": "Asian Art Museum, San Francisco",
    "deskripsi": "The famed Mas school of polished wood sculpture, began in 1930 when Ida Bagus Gelodog and his younger cousin, Ida Bagus Njana, following the encouragement of their close friend Walter Spies began experiment-ing carving in a modernistic style that unlike most traditional Balinese sculpture was left unpainted. During his pre-war career, Gelodog, also made unpainted masks as objects d'art. Images of Rama and Sita mark the epitome of physical and spiritual male and female beauty as here captured by this master artist. These two masks, along with a third on the next page are carved of sandalwood. Rare, fragrant and expensive, they have been a special commission by the well known Austrian author, Vicki Baum, who visited Bali in 1935.",

    "tahun": "1938",
    "lokasi": "Private Collection, Bali",
    "deskripsi": "This exquisite mask is attributed to the master carver and high priest, Ida Pedanda Sidemen of Sanur. It is testimony of his ability to strike a perfect balance between realism and idealism. The features, round well-drawn face, languid eyes, arched eyebrows, shapely lips with a slight hint of a smile, finely coiffed hair, held back with a gold hair band and large round earplugs (subeng), create a beneficent aura of grace and elegance. Liter-ally speaking Sita is the archetype of Balinese female beauty connected to a long list of goddesses including Dewi Sri, Parwati and Prajnaparami-ta. This mask was presented as gift by President Sukarno, to one of his secretaries in the 1950s.",

    "id": "TP079",
    "nama": "Dian Rayak",
    "tahun": "1930",
    "lokasi": "Museum Sonobudoyo, Yogyakarta",
    "deskripsi": "Son of the raksasa demon, Sri Jaya Pangus, and Dewi Danu, the goddess of Lake Batur, Sri Mayadenawa was a mighty practitioner of the dark arts which he used to establish hegemony over Bali and the neighboring islands in the 11th century. As his power grew so did his arrogance. Believing himself invincible, he ordered the populace to make offerings and prayers to him rather than the gods and ancestors. This so enraged the priest, Mpu Sangkul Putih that he mounted Gunung Agung and asked them to intervene. Confronted with the army of Indra, the king of the gods, Mayadenawa fled to Tampaksiring and resorted to magic to throw his pursuers off his path. In the end, he would take on the form of jungle fowl (manuk), but was finally trapped and killed. Villainized as the epitome of evil (adharma), his defeat is celebrated every 210 days during the Galungan-Kuningan Festival. In an alternative reading, it has been speculated that Mayadenawa was a Buddhist who sought to break the monopoly of the Shaivite priests.",

    "tahun": "1956",

    "deskripsi": "This mask is based on a drawing of a 14th-century Majapahit-era terracotta head made by artist Henk Ngantung before World War Two The Indonesian poet, journalist and fervent nationalist Mohhamad Yamin identified the head as a portrait of Gadjah Mada, the famed Majapahit prime minister who uttered the Palapa Oath-a declaration of his intention to unite Indonesia-at his inauguration. With a brown complexion, large bulbous nose, serious expression and square, corpulent face, Gadjah Mada appears as a determined and experienced middle-aged man. His aspect here is in notable contrast to the 17th-century Gadjah Mada mask of Blahbatuh, where he resembles a young Javanese prince.",

    "lokasi": "Collection of the Griya Pidada Family Temple, Klungkung",
    "deskripsi": "Wearing an elaborate floral crown, despite his ample facial hair and robust appearance, here Kerebuak has chosen to portray the famous prime minister as a handsome noble with a light complexion and intelligent, kind demeanor, which contrasts with the visualizations of this exceptional man by other mask makers, most many seem to have preferred images of stout, even knarly older men with determined expressions. These variations also mirror the many undercurrents and attitudes concerning Gadjah Mada, who was after all an imperialist and invader who resorted to overwhelming power and trickery to overcome the native Balinese forces. Nonetheless, as was the case with Pasung Grigis, Gadjah Mada, a force that could not be resisted.",

  {
    "id": "TP086",
    "nama": "Patih Sira Gadjah Pagon",
    "tahun": "18th century",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Sira Gadjah Pagon was a high noble in the court of the Singosari Kingdom. After its last king, Kertanegara was murdered by the rebel Jayakatwang, Sira become of one the nine knights who swore allegiance to Kertanegara's son-in-law, Raden Wijaya After and arduous struggle against the rebels and army of Genghis Khan, the victorious knights established the Majapahit Empire with a new capital at Trowulan. Sadly Sira Gadjah Pagon did not take part in the new kingdom. Monstrously disfigured in battle, he instead retreated to an isolated village to heal. This proved to be a blessing in disguise because it prevented him from being dragged into the ensuing power struggles at the court. Despite his deformed exterior, Sira Pagon was happily married and sired children. The most famous of them was Gadjah Mada, who joined the Majapahit court during the rule of its second raja, Jayanegara. Cunning and capable he was later appointed prime minister and regent to the underage Hayam Wuruk who would go on to rule over forty years. A true golden age, the period saw the blossoming of many of Indonesia's greatest artistic traditions.",
    "lat": 52.164104,

    "image": "TP086.jpg"

  {
    "id": "TP087",
    "nama": "Galuh",
    "tahun": "1938",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "While the Barong Landung is best known for its two main figures-the black-faced Jero Gede and his white-faced wife, Jero Luh-in certain areas in the region of Denpasar, these giant puppets are joined by their children and other personages. The group wan-ders through village streets at the end of the Galungan-Kuningan festivities, spreading mirth with their quirky movements and bawdy call-and-response couplets.\n\nThese two resplendent masks show Mantri, the son who's name implies that he is well-educated, and Galuh, or princess. In contrast to their odd-looking parents, they appear to be handsome aristocrats. Their status is emphasized by the light color of their skin (flesh-tone and cream), and large golden ear ornaments: Mantri's are pais-ley-shaped while Galuh wears round earplugs (subeng). In addition, Galuh wears a beautiful crown encrusted with jewels that rises above her hairline. What they do share with Jero Gede and Luh are a pair of extremely large ears that point out to the side. This may have to do with a prevailing belief in Eastern countries that large ears are a sign of intelligence and good character.",
    "lat": 52.164104,
    "lng": 4.483984,
    "image": "TP087.jpg"
  },
  {
    "id": "TP088",
    "nama": "Garuda",
    "tahun": "19th century",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Garuda, the mythological half-man, half-eagle, is the son of the great sage Resi Kasyapa and his wife Winata. He is closely associated with Wisnu, the god of kingship, who is frequently seen riding on his back. Garuda appears in several sacred texts including the Mahabharata. In one story he sneaks into heaven to steal amerta, the elixir of immortality, in order to free his mother. He is challenged by and defeats Indra, the king of the gods, before peace is restored. Here Garuda is depicted with a green complexion. Often compared with the sun, he is shown with golden horns, eyebrows and an open beak exposing his sharp teeth and fangs. His royal status is seen in his tear-drop shaped earrings. This mask was collected in the vicinity of Ubud in 1920 BY H.T. Damst\u00e9 who was the resident (equivalent of a governor) of Bali from 1919-1923.",
    "lat": 52.164104,
    "lng": 4.483984,
    "image": "TP088.jpg"
  },
  {
    "id": "TP089",
    "nama": "Garuda",
    "tahun": "1935",
    "lokasi": "Private Collection, Bali",
    "deskripsi": "With light green colored feathers, particular large round eyes, butterfly-shaped ears and a long tongue, this is another classic example of Garuda. Although the attempt of his cousin, Jatayu, to stop Rawana's kidnapping of Sita, is better known and critical to the plot, in a more obscure episode of the story, Garuda saves the lives of Rama and Laksmana from certain death after they were bitten by magical snake-arrows (Nagapasha) shot by Rawana's son Indrajit. To save them, Wibisana, created countless incarnations of Garuda, each which attacked the snake arrows before they could hit. So, too, Anoman would fly to the Himalayas to seek the antidote to the poison.",
    "lat": -8.409518,
    "lng": 115.188916,
    "image": "TP089.jpg"
  },
  {
    "id": "TP090",
    "nama": "Kapi Gawakasa, Son of Surya",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Known as Kapi Handoko on Java, Gawaksa is the creation of the sun-god Surya. With the body of a monkey, his head is either that of a banteng, a species of wild and domesticated cattle native to Indonesia, or a wild boar. A brave warrior, he is a member of the wanara army commanded by Sugriwa that invades Alengka with Prince Rama. This mask is in the style of the Pemedilan or Pemecutan District of Denpasar.\n\nSadly, active Wayang Wong troupes are no longer found within the precincts of Badung (the Balinese name for the once-powerful kingdom of Denpasar). It is possible that their sudden demise was directly or indirectly linked to the fall of their royal patrons in 1906, when Dutch colonial forces invaded Badung. The invasion resulted in the utter destruction of the Pemecutan and Denpasar palaces, which were set afire by their rulers to prevent the invaders from seizing their wealth.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP090.jpg"
  },
  {
    "id": "TP091",
    "nama": "Frog Prince",
    "tahun": "1960",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Animal masks, including those of frogs, are part of older traditions in mask dance. Groups of animals would engage in amusing antics to provide comic relief to the often long and convoluted plots of serious historical dances.\n\nThe Wayang Wong Ramayana is a good example of this convention, as the monkeys and other beasts often perform entertaining dances. While it is difficult to say when exactly such frog masks-with jaws that could open and close to create clackiing sounds were first seen by Westermers, it did not take long for the Balinese to realize that they were a hit, leading to the creation of a new dance form dubbed the Frog Prince. One of the earliest and most famous frog mask-makers was I Dewa Putu Kebes of Batuan Village, Gianyar. This wonderful example, with a jointed lower jaw to allow movement, has a yelllowish complexion with black dots. Incongruously, it also has a row of teeth. It is one of several masks donated by the artist in 1959.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP091.jpg"
  },
  {
    "id": "TP092",
    "nama": "Hari Menda Singa-Lion",
    "tahun": "19th century",
    "lokasi": "Private Collection, Mas",
    "deskripsi": "While illustrating the same character, Hari Menda, these two masks are from different backgrounds and dance forms. Black with mottled golden spots, the elaborate perforated lion's mane above is decorated with mirrors. The extensive use of gold leaf and delicate painting indicate that it was from a royal Wayang Wong set probably in the vicinity of Singapadu. While equally exuberant, the second mask, which is white with black spots, perhaps inspired by leopards, is far more folkloric. It belongs to the Barong Dingkling dance performed in certain villages in South Bali after the Galungan-Kuningan ceremony has ended. It is also known as Blas-Blasan, literally 'to jump around', a referral to the animated antics of the dancers. Also based on the Ramayana story, wear Wayang Wong masks, however, rather than perform in a set arena, the wander around the village dancing and jumping to the delight of the children.",
    "lat": -8.541481,
    "lng": 115.27515,
    "image": "TP092.jpg"

    "deskripsi": "A servant to the high priest, I Baru is a type of comic Bondres figure whose main duty is to carry all the ritual paraphernalia of his master. The skull-like appearance of this red-hued mask is emphasized by the rows of grooves representing deep wrinkles, gaping eye holes, a pug nose and a broad mouth with a full row of widely-spaced upper teeth. The lower jaw is hinged, allowing the dancer to move it and banter.",

  {
    "id": "TP095",
    "nama": "I Gede Basur",
    "tahun": "1936",
    "lokasi": "Private Collection, United States",
    "deskripsi": "A refined minister in the 11th Udayana court by day, I Gede Basur, was a secret practitioner of magic, which he surreptiously used to advance and enrich himself unbeknowst to his peers. One time after a pretty village girl and her father refused to marry his ugly son because she was bethrothed to another, he cast a spell of pestilence on her entire village that caused them all to die. Basur would meet his match in the form of Ni Garu, a plain looking silly girl who fell hopelessly in love with his son, I Tigaron, who cruelly humiliated her for daring to think she was his equal. Overcome with shame the girl flees to the cemetery to kill herself where she encounters Bhatari Durga, the goddess of the underworld, who invites her to become a member of her witches; coven. Developing amazing powers, she would challenge and defeat Basur and expose him as a sorceror. Here Basur is shown in a demonic form with a greenish pallor, broad nostrils, wild hair and enomrous red lips with black and white teeth. Ironically he closely resembles the yellow faced Garu who shares the same intense expression and enormous lips. Both masks are from the same maker.",

    "deskripsi": "I Gusti Dauh Bale Agung was a renowned Balinese author who studied under Danghyang Nirartha, the influential Javanese high priest responsible for the reformation and unification of Balinese religion during the 16th century. This period, under the Gelgel Dynasty, was renowned for the blossoming of the arts in Bali. Bale Agung's name is mentioned in various palm-leaf manuscripts dating from the reign of Dalem Bekung, who succeeded his father Dalem Waturenggong around 1564.",

    "id": "TP097",
    "nama": "I Gusti Pande Base",
    "tahun": "-",
    "lokasi": "Private Collection, France",
    "deskripsi": "The fierce intensity of this red-faced minister whose eyes bulge out from deep sockets strong features reminiscent of a skull speak deeply about the ability of Bali's best mask makers to envision even minor historical char acters with vibrant emotional characteristics that could immediately impact audiences. I Gusti Pande Base was a highly capable and suspicious minis-ter in the court of the Dewa Agung, ruler of Klungkung. When it came to his attention that Ki Gusti Telabah, a dashing young knight from Badung, was a frequent visitor, he decided to investigate. After discovering that he was having an affair with one of Dewa Agung's wives, he cleverly exposed him in court by bringing attention to a golden ring with a ruby Telabah was wearing When the king saw it, he realized that it was a gift he had presented to his wife. It was Base who would mercilessly hunt down Telabah and execute him. Because this mask, originally attributed to Ida Pedanda Sidemen of Sanur, is dated 1858 on the back, the assumption is that it was made by his teacher Ida Bagus Lanang Banjar.",

  {

    "deskripsi": "A dashing and handsome dancer from Tabanan, I Gusti Telabah, was invited to perform at the court in Klungkung. Soon, afterwards he became a frequent visitor. Suspicious that something was up. I Gusti Pande Basa, discovered that he was having an affair with one of the king's concubines He would expose him at court by admiring a ring with a ruby worn by Telabah. As the king had given it as a present to his concubine, an order was given to put him to death. After hiding in Kuta, Telabah was finally killed but only after several botched attempts",

    "tahun": "-",
    "lokasi": "Private Collection, France",
    "deskripsi": "As his father, whom he closely resembles, Indrajit is full of confidence and arrogance. It is the ancient moral tale of mortals striving for invincibility and immortality only to stumble and fall. The independent kingdom of Bangli was one of many smaller states that emerged on Bali in the 17th century after the demise of the Gelgel Dynasty. Landlocked, it developed close relations with Buleleng Kingdom in the north explaining why the Wayang Wong set in Tejakula, North Bali, was said to be made by I Gusti Ngurah Ketut Jelantik of Bangli. Celebrated for being vigorous and expressive, Bangli is still a mask making center",

    "id": "TP100",
    "nama": "Megananda",
    "tahun": "-",
    "lokasi": "Museum of Puro Mangkunegaran, Solo",
    "deskripsi": "Executed in the classic style of Klungkung, where Balinese Wayang Wong as we know it came into being in the 16th century, the mask depicts Megananda, the son of Rawana, the sorcerer king of Alengka and villain of the Ramayana story. At the time of his birth, his father, who was in deep meditation, instructed his brother Wibisana, to ensure the birth of a boy, as a girl would mark the end of his dynasty. Wibisana did this by conjuring up Megananda from the sky, explaining the blue color of his face. The mask was presented to Adipati Mangunegaran VII of Solo by his close friend, I Gusti Bagus Jelantik, the viceroy of Karangasem, who knew of his great love of mask dance. Over the decades before the outbreak of World War Two, Jelantik would sponsor dances and present masks, usually from Klungkung, to his friend.",

    "id": "TP101",

    "tahun": "1920",
    "lokasi": "Museum of Puro Mangkunegaran, Solo",
    "deskripsi": "This magisterial mask with a gold cross surrounded by stars on his crown and light flesh colored skin, represents the founder and ruler (1660-1683) of Denpasar's illustrious Pemecutan Dynasty. This occurred after Jambe Pule was awarded a magical whip (pecut from which the name Pemecutan) and blowpipe (tulupan) by Dewi Danu, the goddess of Lake Batur, in honor of the deep meditations and austerities he performed on the slopes of Batur Volcano, mountain of the same name. After I Gusti Maruti, murdered his cousin, Dalem Di Made, the rightful raja of Gelgel, Jambe Pule was one of a coalition of princes who brought the coup d'etat to an end. The mask was photographed by scholar Claire Holt in 1926",

    "id": "TP102",
    "nama": "Jatayu",
    "tahun": "-",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "This is a mask of Jatayu the vulture, who played a vital role in the Ramayana epic.\n\nThe story goes that while attempting to stop Sita's abduction by the evil sorcerer-king Rawana, Jatayu's wings were clipped and he was fatally wounded. He heroically managed to stay alive until Sita's husband Rama and brother-in-law Laksmana arrived. As he lay dying, Jatayu named Rawana as the perpetrator and informed the brothers that he had taken Sita south to his kingdom of Alengka (Sri Lanka).\n\nThis set in motion the epic battle to defeat Rawana and rescue Sita. Complete with a perforated gilded leather crown, the mask shows Jatayu staring alertly into the distance.",

  {
    "id": "TP103",
    "nama": "Jatayu the Vulture",
    "tahun": "-",
    "lokasi": "Museum Sonobudoyo, Yogyakarta",
    "deskripsi": "For the greater part, Jatayu is white, perhaps a reference to white as the color of mourning. Despite being scavangers who are often found in the vicinity of burial and burning grounds, vultures are respected for the valuable role they play in the cycle of life. While worn from use, the undulating shape of the bird head is reflects the Balinese sophisticated sense of form. Like all of these masks, the ears have been carved separately and attached with cord to the main mask. The tongue, too, is a separate piece of wood that can be moved by the dancer to lively effect. While their beaks are held wide open they are not hinged or movable like the barong.",

    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "With an unusual turquoise colored face and a row of real feathers as eyebrows and a three pronged crown, this is a rather unusual mask of Jatayu. Made in Batuan, it nonetheless stays true to a canon or art that dates back all the way to medieval Java. Batuan, having produced many of Bali's greatest dancers, has been a great center of the arts since the 17th century kingdom of Sukawati. This mask was once owned by the renowned dancer Pan Ruju.",

    "id": "TP105",
    "nama": "The Vulture Jatayu or Garuda",
    "tahun": "-",
    "lokasi": "Private Collection, Great Britain",
    "deskripsi": "Long and elegant, this white-faced, sharp-beaked bird most probably represents Jatayu, the mythological vulture from the Ramayana. In the story, Jatayu heroically attempts to come to the rescue of Princess Sita as she is being kidnapped by Rawana, the raksasa-king of Alengka (Sri Lanka). As he lies dying, he sets the main events of the Ramayana Epic in motion by telling Prince Rama about the abduction of his wife.\n\nWith golden teeth, bushy eyebrows and large, unusually shaped eyes, this is an example of early precolonial Balinese mask-making at its height. Because of its shape, it has also been suggested that the mask was once placed on the head of a large royal kite in the shape of a bird (janggan). Spanning three or more meters in width, with cloth tails up to 60 meters long billowing in the air behind them, these magnificent aircraft were flown in great competitions off Sanur Beach from June to August, riding on the powerful cool breezes of the eastern monsoon.",

  {
    "id": "TP109",
    "nama": "Jauk Keras",
    "tahun": "-",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "This lively mask of a dynamic and important minister is notable for its light blue complexion. The precision of the gold leaf and polychrome drawing, along with the inlaid mother-of-pearl teeth are typical of Denpasar's master mask makers of the first decades of the 20th century. Frits Liefkes was a furniture curator at the Rijksmuseum in Amsterdam, who put together an important collection of Balinese and Indonesia art, which he bequeathed to the Ethnographic Museum in Leiden, which published a book, Living with Indonesian Art:\nThe Frits Liefkes Collection (Brinkgeve, 2013).",

  {
    "id": "TP110",
    "nama": "Jauk Keras",
    "tahun": "-",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Despite being from opposite sides of the island, these two Jauk Keras masks are remarkably similar. In both cases the artists of used dark complexions and emphasized deep facial lines to achieve the same brooding attitude. The use of gold, in the example from Denpasar, is especially masterful. The main differences are the size of the eyes, those on the left are larger and the number of teeth, in one case four the other six. The mask from Singaraja also has magical gold symbols between his eyebrows, one an upward facing crescent moon, where the other has bumps with lines.",

  {
    "id": "TP111",

    "lokasi": "I Made Nyarikan Sriada Family Temple, Denpasar",
    "deskripsi": "Red-faced, with raised eyebrows, tense forehead, snoutlike nose and mouth open as if yelling, this unusual Jauk Keras may actually be a Penamprat, an evil character who appears during various sacred dances to drive away the beneficent Telek. While often, as here, heavily worn from use, old collections, such as that now held in the Sriada family temple, offer important pieces of information in the reconstruction of the history of mask making and dancing on the island. Probably because he was not himself a mask maker, Sriada often inscribed the names of artists and their villages on the backsides. While there is currently no further information about I Rentuh, the sheer power of this example proves that the number of masters working was far broader than we now know.",

    "id": "TP115",
    "nama": "Jauk Manis",
    "tahun": "1920",
    "lokasi": "Private Collection, Switzerland",
    "deskripsi": "While best known for his remarkable drawings, long before he achieved fame in the 1930s for his art, Lempad, was a famed traditional architect, sculptor and mask maker, who had earned the title of master (undagi), already in the late 19th century. While a number of unpainted masks made by him are on display in his family compound in Ubud, these are later and more modenistic.\n\nThis is perhaps the only example of a traditional polychromed mask from this extraordinary artist who died in 1978 at the age of 116. Depicting a refined Jauk, as all his works it relies on precise lines and effortlessly perfect balance.\n\nThe mask is unique because of the artist's use of small white dots around the pupils. The mask was bought by the present owner in 1974 from Tjokorda Gde Agung Suyasa of Puri Saren Kauh.",

    "id": "TP116",

    "tahun": "19th century",
    "lokasi": "Museum Sonobudoyo, Yogyakarta",
    "deskripsi": "With a white complexion, wide open eyes staring ahead with intensity, flared nostrils, moustache and grinning mouth, this is a classical Jauk Manis or refined Jauk from the 19th century. In the original notes of the Java Institute (1919-1942), it is described as a Jauk Bendesa or village headman. In 1935 the institute's collection, which included Balinese as well as Javanese artifacts, was housed in its current location near the royal palace of the sultan of Yogyakarta. Officially named Kayu Winayangan ing Brahmana Budha, this was shortened by most to Sonobudoyo. Although the Java Institute was disbanded after the Japanese invasion, responsibility for Sonobudoyo was given to local officials. In 1974 it was handed over to the national government.",

    "id": "TP117",
    "nama": "Refined Demon (Jauk Manis)",
    "tahun": "1930",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "To the left is a mean looking Jauk Penamprat, a unique type of Jauk mask used in the vicinity of Denpasar, the old capital of the mighty Badung Kingdom. As befitting its status as a demonic figure it appears during ritual Barong and Rangda dances. Smaller than classic Jauk masks, its complexion is steely grey rather than red or white. With large eyes, pronounced facial lines, long bushy eyebrows and a moustache tinged with white, he is apparently of middle-age and not in good humor. The second mask to the right, is a tour de force. Full-faced with copious black hair and red eyes, the laugh lines on his face and large smile are nonetheless unnerving. This ambiguity is typical of the best Jauk Manis masks. The gilded silver jewelry on his third eye and forehead is a later addition.",

    "tahun": "19th century",
    "lokasi": "Private Collection, Mas",
    "deskripsi": "With skull-like pale chalky complexions and otherworldly blood red eyes and lips, the ghostly aesthetic of these ephemeral creatures strikes a note of fear even though they are the 'sweeter' type of Jauk. The particularly eerie style and coloration appears to be archaic and relatively rare. It is possible that this style first appeared in the mid-19th century when the Barong-Rangda dance spread like fire in the south following a series of natural disasters including pestilence, smallpox plagues, rat infestation, drought and crop failures that took the lives of thousands.",

    "tahun": "1910",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "Despite being from opposite sides of the island, these two Jauk Keras masks are remarkably similar. In both cases the artists of used dark complexions and emphasized deep facial lines to achieve the same brooding attitude. The use of gold, in the example from Denpasar, is especially masterful. The main differences are the size of the eyes, those on the left are larger and the number of teeth, in one case four the other six. The mask from Singaraja also has magical gold symbols between his eyebrows, one an upward facing crescent moon, where the other has bumps with lines.",

    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "The four highly dramatic masks appearing on the final pages of this section were conceived and created by one anist. With exaggerated features, long noses, sharp chins and menacing open grins exposing upper rows of large unusually shaped incisors, the sumptuous use of gold leaf and cinnabar indicate they were made for a royal troupe. Similarities between thers suggest that they were conceived as a family of punakawan who acted as courtly advisors. Obviously of demonic origin (denawa), this may have been for a villainous prince, According to I Made Bandem, they were probably used as preliminary characters (penamprat) who are the first to appear duing Telek performances along the west coast of the kingdom of Badung reaching from Jimbaran, the gateway to the Bukit Peninsula to Kerobokan, a mighty village just west of the capital in Denpasar. With no known comparative masks, it has also been suggested that because of their long noses they represent westen sailors. Three of the four have reddish complexions however, the fourth with narrow evil looking eyes is yellow.",

    "id": "TP134",
    "nama": "Jelantik, General I Gusti Jelantik Pesimpangan",
    "tahun": "1950",
    "lokasi": "Collection Sanggar Seni Kakul, Batuan",
    "deskripsi": "In the 16th century, Dalem Waturenggong sent Gusti Jelantik and Ki Patih Ularan to squash a rebellion in the province of Blambangan, East Java. Returning victorious they would carry with them war booty that included the now famous Gadjah Mada masks of Blahbatuh. Jelantik was also a talented dancer who intiated a dance using them that is said to have been the origin of Topeng Pajegan. Until today his descendents have continued to claim their right to be the masks caretakers. With a red ochre colored face, strong features and thick hair and a full moustache, Jelantik appears as a leader and warrior",

    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Jembawan is a bear of immense strength. After being defeated by Lord Kris-na in a battle over a magical jewel, he not only pledges his loyalty but also gives his daughter in marriage to the midnight-blue god. It was Krisna who instructed Jembawan to join Prince Rama in his battle against Rawana. The mighty bear also plays a key role in discovering the whereabouts of the kid-napped Princess Sita. Here he is shown with an intelligent face and two long fangs from his upper jaw descending to his chin.",

  {
    "id": "TP136",
    "nama": "Jero Gede",
    "tahun": "1920",
    "lokasi": "National Museum Indonesia, Jakarta",
    "deskripsi": "The black, grinning face of Jero Gede, literally the great elevated one, is here colorfully decorated with red and gold lines made of pure gold leaf. Four enormous upper teeth protrude at an angle from his mouth. The Barong Landung dance is particu-larly popular in the south of Bali, especially in the areas around Badung. During the performance, these giant puppets emerge and wander through the streets, evoking mirth with their bawdy poetry and amusing antics. Barong Landung is danced at the end of the Galungan-Kuningan festival, which takes place every 210 days according to the Balinese lunar calendar.",
    "lat": -6.176424,
    "lng": 106.821815,
    "image": "TP136.jpg"
  },
  {
    "id": "TP137",
    "nama": "Jero Gede",
    "tahun": "1937",
    "lokasi": "Collection Nationaal Museum van Wereldculturen, Leiden",
    "deskripsi": "With jet-black skin, this Jero Gede mask is dominated by elephantine ears and four enormous buck teeth that jut out at an angle below bright red lips. A golden disk glows at the center of the forehead. Like most images of Jero Gede, the expression suggests hilarity, although in this case there is a hint of a darker undercurrent. This pair of Barong Landung masks was sourced in the vicinity of Denpasar during the 1930s.",

    "id": "TP138",
    "nama": "Jero Gede",
    "tahun": "1930",
    "lokasi": "Museum Sonobudoyo, Yogyakarta",
    "deskripsi": "Because of the absence of evidence, it has been long assumed that Bali's westernmost regency, Jembrana with its capital in Negara, never had a dynamic mask dance tradition. So too, many have forgotten the thousand year old cultural ties between East Java and Bali, including the Osing people, many whom still carry on the Balinese faith. While it is unclear if the Jero Gede to the left was collected in Banyuwangi, East Java (capital of the old kingdom Blambangan that was ruled by Bali) or Jembrana, West Bali, its unusual characteristics, in particular the use of dots, may confirm that the Barong Landung was once performed in West Bali and perhaps even East Java. The mask is also notable because it has a hinged jaw unlike the majority of Barong Landung.",

    "id": "TP140",
    "nama": "Jero Gede",
    "tahun": "1968",
    "lokasi": "Private Collection, Bali",
    "deskripsi": "These are two examples of Barong Landung masks made at the end of the 1960s. While sold to visitors, in this case a Swiss employee of the Bali Beach Hotel who arrived in 1968, the makers were not really producing for tourists but rather taking advantage of their art to sell to a new market. While the paint used is made of natural pigments, the gold leaf has been replaced with far less expensive paint, which uses another metallic substitute. The beneficent oval face and fine features of Jero Luh radiate a peace the appearled to foreigners. In contrast and in spite of his jovial expression, Jero Gede with his large buck teeth and fangs never achieved the same popularity.",

  {
    "id": "TP141",
    "nama": "the Wife Of Jero Gede",
    "tahun": "19th century",
    "lokasi": "National Museum of Indonesia, Jakarta",
    "deskripsi": "With a jutting forehead that looms over her eyes, high cheekbones, large ears, a fleshy chin and delicate nose and mouth, the white-complexioned giantess Jero Luh has the aura of an otherworldly creature. The size, imagination and generous use of gold leaf to decorate her face, perhaps showing wrinkles, is a sign that the mask was commissioned from a master artist by a wealthy patron: likely a palace, temple or village organization. Along with her husband and children, Jero Luh, who some say has Chinese blood, wanders the village streets with a special orchestra at the end of the Galun-gan-Kuningan Festival, engaging in witty call-and-response poetry. After finishing a refrain, each of the giant puppets swirls and bounces up and down with mirth before moving on to the next corner",
    "lat": -6.176424,
    "lng": 106.821815,
    "image": "TP141.jpg"
  },
  {
    "id": "TP142",
    "nama": "Jero Luh",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "Dating from the 19th century, this example is a more classical depiction of Jero Luh featuring a large forehead with bump (a sign of wisdom). curved slit eyes, prominent cheeks, a slightly open mouth and square chin. The mask was purchased by the museum as an antique in 1932. though it most certainly dates from an earlier period. As sacred masks, Barong Landung are the property of temples. They are replaced on rare occasions and only for important reasons such as when they are damaged, or when an omen, dream or message is received from the spint world through a trance state. When this happens, the masks are 'decommissioned in accordance with various ntuals, at which point they can be sold.",

    "lng": 115.218579,

  {
    "id": "TP143",
    "nama": "Jero Luh",
    "tahun": "19th century",
    "lokasi": "Museum Bali, Denpasar",
    "deskripsi": "In contrast to the black or brown complexion of her husband, Jero Luh's skin is usually white or a light shade of yellow. This, along with the narrow curves of her eyes, have led to speculation that she represents someone of Chinese heritage. The curves of her eyes here are particularly strong, as is her pointy chin. Despite the pronounced bump on her forehead and her detached, if not otherworldly, expression, she gives the impression of a benevolent character with the slightest hint of a smile. Although the mask was donated to the museum in 1936 by the famed Austrian novelist Vicki Baum, who authored the best-selling book Love and Death in Bali (1937), it is actually far older. She may have obtained It through the good graces of her friend Walter Spies.",
    "lat": -8.657398,
    "lng": 115.218579,
    "image": "TP143.jpg"

    "deskripsi": "Giantess Jero Luh, with her striking white complexion and bulging forehead, exudes a mysterious, if not otherworldly, aura. This impression is challenged by her blood red lips, thin black facial lines, slit eyes, and holes for earplugs. In comparison to the hilarious expression of her husband Jero Gede, with his buck teeth and mirthful grin, Jero Luh appears to be inscrutable. Published in Exposition d'Art Indon\u00e9sien (1953) and on page 311 of Bali. Art, Ritual, Performance (2011).",

    "tahun": "1968",
    "lokasi": "Private Collection, Bali",
    "deskripsi": "These are two examples of Barong Landung masks made at the end of the 1960s. While sold to visitors, in this case a Swiss employee of the Bali Beach Hotel who arrived in 1968, the makers were not really producing for tourists but rather taking advantage of their art to sell to a new market. While the paint used is made of natural pigments, the gold leaf has been replaced with far less expensive paint, which uses another metallic substitute. The beneficent oval face and fine features of Jero Luh radiate a peace the appearled to foreigners. In contrast and in spite of his jovial expression, Jero Gede with his large buck teeth and fangs never achieved the same popularity.",

    "id": "TP147",

    "tahun": "1930",
    "lokasi": "Museum Sonobudoyo, Yogyakarta",
    "deskripsi": "As indicated by his flame-like stripes, Kapiwara is a tiger, which unlike the lion was native to the island until Balinese subspecies was hunted to extinction in its last refuge in West Bali in the 1930s. Like wild tigers, Kapiwara was solitary and taciturn by character. Despite this he joined the ranks of the highest wanara war councils which gathered before each battle to plan their latest strategy to defeat the fearsome raksasa warriors defending the impregnable castle of Alengka. As the underlying forms of most of the masks, except for the ears, are virtually identical, the best way to identify characters is by studying their painted surfaces. As in this case stripes make it clear this is a tiger.",

  {
    "id": "TP148",
    "nama": "Patih Kebo Ijo",
    "tahun": "1930",
    "lokasi": "I Made Nyarikan Sriada Family Temple, Denpasar",
    "deskripsi": "The greenish hue of the mask's complexion is no doubt influenced by Kebo ljo's name, which literally means the green water buffalo. After surreptiously murdering Tunggul Ametung himself, Ken Arok, the future founder of the Singosari Dynasty, hatched a plot to blame Kebo ljo for the foul crime by presenting him with the murder weapon as a gift. Vain and proud, Kebo ljo strutted about showing off the keris to all and sundry thus unwittingly setting himself up as the prime suspect. While Ijo managed to escape, Ken Arok would marry Ametung's widow, Ken Dedes, who was celebrated as the most beauteous woman in the kingdom. Here Kebo Ijo is depicted as a staid bald-ing aristocrat with long sideburns and a moustache.",

  {
    "id": "TP150",
    "nama": "Kebo Anabrang",
    "tahun": "1930",
    "lokasi": "Collection of the Griya Pidada Family Temple, Klungkung",
    "deskripsi": "Kebo Anabrang was a general in the army of Kertanegara, the last king of the Singosari Kingdom who ruled in the second half of the 13th century. With a ochre red face and full, bushy beard, Anabrang epitomizes the image of a resolute if not cruel military leader. In 1286, he was commander of the Pamalayu Expedition, sent to South Sumatra to enforce its vassal status. He would return to Java in 1293 bringing with him two young princesses to be presented to Kertanegara only to discover he had been murdered the year before. Instead he presented the girls to Raden Wijaya who enlisted his help in his struggle against the rebel Jayakatwang and invading Chi-nese army. A minister in Majapahit Empire, Anabrang was enlisted by Patih Nambi and Mahapati to attack and kill their rival Ranggalawe. In turn he was stabbed to death of Ranggalawe's uncle Lembu Sore.",
    "lat": -8.535487,

  {
    "id": "TP151",
    "nama": "Kebo Iwa",
    "tahun": "1955",
    "lokasi": "Collection Sanggar Seni Kakul, Batuan",
    "deskripsi": "Also known as Kebo Taruna, literally the virgin water buffalo, Kebo Iwa was by most accounts a mighty giant with an insatiable appetite who aided Pasung Grigis, prime minister of Beda Ulu, the king of Bali. Able to stand up and walk only days after he was born, Kebo Iwa was a free spirit who wandered through the wilds of Bali carving out temples from stone cliffs using his fingernails. He was also an enigmatic character who appears to have been naive and simple-minded. In Kebes' version he appears dark-skinned, pudgy and with a squinched face. Opposite, he is shown with bright eyes with khaki complexion and full cheeks. The latter is certainly because of another of his nicknames, Kebo Temben or the chubby waterbuffalo. Often likened to an ancient race of Titans that populated Bali, Kebo Iwa was so powerful that Gadjah Mada resorted to trickery. Heartsick because his huge size had prevented him from ever finding a match, Gadjah Mada promised him the hand of a beautiful princess. Luring him into a trap, the cunning minister called out in panic saying that she had fallen in a deep well. Eager to save her, Iwa descended to the bottom when the Majappahit troops trapped him with stones and slaked lime. Realizing his time had come, Iwa surrended to his fate.",
    "lat": -8.584877,
    "lng": 115.277934,
    "image": "TP151.jpg"
  },
  {

    "tahun": "18th century",

    "deskripsi": "This character is another one of the nine nobles (Lembusora, Gajah Pagon, Medang Dangdi, Mahisa Wagal, Nambi, Banyak Kapuk, Kebo Kepentingan, Wirota and Wiragapati) who remained loyal to Raden Wijaya after the murder of his father-in-law Kertanegara. With a grim expression, bulging eyes, busy facial hair and two fangs, it is clear that Kebo Kepentengan, despite being a supporter of a righteous king, is of demonic origin (danawa). The golden third eye (urna, cudamani) could also indicate that he is a practitioner of tantric rites.",

  {
    "id": "TP154",
    "nama": "Kebo taruna",
    "tahun": "1955",
    "lokasi": "Collection of I Wayan Tangguh-Ketut  Kodi (kediaman seniman)",
    "deskripsi": "This unusual mask-with a jutting forehead, a bulbous, curved nose, large eyes, an open mouth exposing his upper teeth and a prominent moustache carved in wood-depicts the immensely strong primordial giant, Kebo Iwa, who roamed Bali before the coming of Hinduism. A mythological figure, he is believed to have carved temples out of rock with his fingernails. It also said that he was one of the commanders of the Kingdom of Beda Ulu at the time of the Majapahit invasion of Bali in 1343. Kebo Iwa came to a tragic end after the commanders of the Majapahit invasion lured him to Java by offering him the hand of a beautiful princess, Lemah Tulis, as part of a peace settlement. Instead, he was trapped in a well where he died. His story lives on as a potent symbol of the collapse of the old ways.",

  {
    "id": "TP155",
    "nama": "Ken Arok",
    "tahun": "1940",
    "lokasi": "Collection of the Griya Pidada Family Temple, Klungkung",
    "deskripsi": "According to the Pararaton, Book of Kings, Ken Arok, the founder of the Singosari 12-13th century Singosari Kingdom, was of common birth despite his attempts to claim otherwise. A cunning but impatient and violent man, who's path to the throne was strewn with intrigue, lust and blood. Infamously, in a mighty affirmation of the law of Karma, his rule was cut short fulfilling the curse of the priestly keris maker Mpu Gandring in one of most popular legends on Java and Bali. Known as Ken Dedes it begins with Ken Arok plotting to murder of Tunggul Ametung to seize his wife and throne using a magical keris. His obsession to possess her led him to stab Mpu Gandring with the weapon before it was finished. In his dying breath he predicts that Ken Dedes would also meet his end with the same weapon.",

  {
    "id": "TP156",
    "nama": "Monyer, Topeng Kenyem Manis",
    "tahun": "1947",
    "lokasi": "I Made Nyarikan Sriada Family Temple, Denpasar",
    "deskripsi": "The character, Monyer, the Balinese word for sassy, was the creation of I Nyoman Pugra (1915-1975), one of the dancers in Sriada's dance troupe, Topeng Duwe. With a prominent nose, sweet smile and curved moustache, Monyer was a clown full of joyous energy and hilarious choreography that caught the imaginations of Balinese audiences. The character also resembles Stan Laurel who's black and white comedy films with Oliver Hardy were being shown on Bali before the war. The name of the mask maker, I Made Jimbaran, is inscribed on the back side along with 1947, the year that Sriada passed away.",

  {
    "id": "TP157",
    "nama": "I Gusti Anglurah Sakti",
    "tahun": "1934",
    "lokasi": "Museum of Puro Mangkunegaran, Solo",
    "deskripsi": "The face seen here mirrors the archetype of a strong warrior-king determined to vanquish his enemies against all odds, which is true of I Gusti Panji Sakti, who not only single handedly forged a powerful new kingdom in north Bali in the 17th century but also defeated a superior invading Javanese army with no help from Bali's other kingdoms. Gusti Panji based his legitimacy on the claim he was the son of Dalem di Made, the last king of Gelgel. According to rumor, however, it was also said that he was the illegitimate child of a beautiful but common village woman working in the court. Kerebuak's choice to give him a dark reddish complexion was certainly based on his nickname 'Barak', the Balinese word for red. The color and his bushy hair also suggests humble origins.",
    "lat": -7.566756,
    "lng": 110.823071,

  {
    "id": "TP158",
    "nama": "Ki Pasung Grigis",
    "tahun": "1955",
    "lokasi": "Collection Sanggar Seni Kakul, Batuan",
    "deskripsi": "Of royal descent and a capable military strategist, Ki Pasung Grigis, led the armies of the Kingdom of Bali against the invading troops of the Majapahit armies in 1343. The conflict was going badly especially after the death of his student, Kebo Iwa. Grigis continued to put up a fierce resistance but was finally overwhelmed by the superior Javanese forces and captured. Praised by the new regime for his courage, he finally agreed to serve them. To prove his loyalty he led troops against Dedela Nata, the raja of Sumbawa who rose up in rebellion. While he was ultimately victorious, Grigis would perish along with Nata during a hand-to-hand duel. With a steely gray complexion, chubby cheeks and an open expression, Kebes delighted in bringing those behind the throne to life.",
    "lat": -8.584877,
    "lng": 115.277934,
    "image": "TP158.jpg"

  {
    "id": "TP159",
    "nama": "Ki Pasung Grigis, Prime Minister of the Kingdom Of Bedahulu",
    "tahun": "1930",
    "lokasi": "Collection of the Griya Pidada Family Temple, Klungkung",
    "deskripsi": "The son of an ascetic, Pasung Grigis was the prime minister of the raja of Bedulu kingdom, so-named because its ruler had the head of a pig, at the time Bali was invaded by the forces of the Majapahit army in 1343. After the death of his liege lord, Grigis chose to swear fealty to the conquerors. Appointed a minister in the new regime, he was subsequently ordered to put down a rebellion on Sumbawa led by Dedela Nata. While the mission was successful, Grigis died as a result of wounds inflicted by Dedela. Portrayed as a powerful and intelligent man (Patih Deling Keras) with curly hair and a mustache, Grigis wears a large golden diadem with a row of pointed lotus petals at the crown and three five-petaled blossoms underneath.",
    "lat": -8.535487,
    "lng": 115.406221,
    "image": "TP159.jpg"
